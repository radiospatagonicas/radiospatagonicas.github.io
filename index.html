<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radios Patagónicas | Directorio Oficial</title>

<style>
:root { --azul:#0077ff; --negro:#0a0a0a; --gris:#161616; --texto-gris:#888; }

body { margin:0; background:var(--negro); color:white; font-family:'Segoe UI',sans-serif; }

/* HEADER */
header { text-align:center; padding:40px 20px; background:#111; border-bottom:4px solid var(--azul); }
.logo-texto { font-size:32px; font-weight:900; display:flex; justify-content:center; gap:10px; }
.detalle { color:var(--azul); font-size:40px; }

/* BANNER */
.banner-top {
    width: 100%;
    height: 140px;
    margin: 0;
    overflow: hidden;
    background: #111;
}

.banner-top img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* CONTROLES */
.controles { padding:20px; background:#1a1a1a; position:sticky; top:0; z-index:100; text-align:center; }
#buscador { width:85%; max-width:400px; padding:12px; border-radius:25px; border:2px solid var(--azul); background:#222; color:white; margin-bottom:15px; }

.filtros { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.btn-filtro { padding:8px 15px; border-radius:20px; border:1px solid #333; background:#222; color:#ccc; cursor:pointer; font-size:11px; }
.btn-filtro.active { background:var(--azul); color:white; }

/* GRID */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; padding:20px; max-width:1200px; margin:0 auto; }
.card { background:var(--gris); padding:25px; border-radius:20px; text-align:center; }
.name { font-size:18px; font-weight:bold; }
.city { font-size:12px; color:var(--texto-gris); margin-bottom:15px; }

/* BOTONES */
button.play { width:100%; padding:14px; border:none; border-radius:12px; background:var(--azul); color:white; cursor:pointer; }
button.play.activo { background:white; color:black; }

.share-link { margin-top:10px; font-size:12px; color:#25d366; cursor:pointer; }

.wa-btn { display:block; margin-top:8px; font-size:12px; color:#25D366; text-decoration:none; font-weight:bold; }
</style>
</head>

<body>

<header>
<div class="logo-texto"><span class="detalle">[</span> RADIOS PATAGÓNICAS <span class="detalle">]</span></div>
</header>

<!-- BANNER -->
<div class="banner-top">
<a id="bannerLink" href="https://wa.me/5493755596267?text=Hola,%20quiero%20publicar%20en%20Radios%20Patagónicas" target="_blank">
<img id="bannerImg" src="banner.png" alt="Publicidad">
</a>
</div>

<div class="controles">
<input type="text" id="buscador" placeholder="Radio, ciudad o estilo...">

<div class="filtros">
<button class="btn-filtro active" onclick="filtrarProvincia('todas',this)">TODAS</button>
<button class="btn-filtro" onclick="filtrarProvincia('rionegro',this)">RÍO NEGRO</button>
<button class="btn-filtro" onclick="filtrarProvincia('neuquen',this)">NEUQUÉN</button>
</div>
</div>

<!-- GRID -->
<div class="grid">

<div class="card" data-provincia="rionegro">
<div class="name">LU 18 AM 640</div>
<div class="city">General Roca</div>
<button class="play" onclick="playRadio(this,'https://streamingraddios.online/proxy/valle?mp=/;')">▶ Escuchar</button>
<div class="share-link" onclick="compartir('LU18')">Compartir</div>
</div>

<div class="card" data-provincia="neuquen">
<div class="name">AM 550</div>
<div class="city">Neuquén</div>
<button class="play" onclick="playRadio(this,'https://sonic.host-live.com:10851/stream')">▶ Escuchar</button>
<div class="share-link" onclick="compartir('AM550')">Compartir</div>
</div>

</div>

<audio id="audioPlayer"></audio>

<script>
const player = document.getElementById('audioPlayer');

// RADIO
function playRadio(btn,url){
if(player.src===url && !player.paused){
player.pause();
resetButtons();
}else{
resetButtons();
player.src=url;
player.play();
btn.innerText="⏸ PAUSAR";
btn.classList.add('activo');
}
}

function resetButtons(){
document.querySelectorAll('.play').forEach(b=>{
b.innerText="▶ ESCUCHAR";
b.classList.remove('activo');
});
}

// BUSCADOR
document.getElementById('buscador').addEventListener('input',e=>{
const val=e.target.value.toLowerCase();
document.querySelectorAll('.card').forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?'block':'none';
});
});

// FILTRO
function filtrarProvincia(prov,btn){
document.querySelectorAll('.btn-filtro').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

document.querySelectorAll('.card').forEach(c=>{
c.style.display=(prov==='todas'||c.dataset.provincia===prov)?'block':'none';
});
}

// COMPARTIR
function compartir(nombre){
const url=window.location.href;
window.open(`https://wa.me/?text=Escucha ${nombre} ${url}`,'_blank');
}
</script>

</body>
</html>
