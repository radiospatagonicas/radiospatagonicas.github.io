<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📻 Radios Patagónicas</title>
    <style>
        body { margin:0; font-family: Arial, sans-serif; background:#0d0d0d; color:white; }
        header { text-align:center; padding:15px; background:#1a1a1a; font-weight: bold; }
        .now { text-align:center; padding:10px; background:#222; color:#00ffcc; font-size:14px; min-height: 20px; }
        .player { width:95%; margin:10px auto; }
        audio { width:100%; height: 40px; }
        .filters { display:flex; overflow-x:auto; gap:10px; padding:10px; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .filters button { padding:8px 15px; border:none; border-radius:20px; background:#333; color:white; cursor: pointer; }
        .search { width:95%; margin:10px auto; }
        .search input { width:100%; padding:12px; border:none; border-radius:10px; background: #222; color: white; width:100%; box-sizing:border-box; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:10px; padding:10px; }
        .card { background:#1e1e1e; padding:15px; border-radius:12px; text-align:center; border: 1px solid #333; }
        .name { font-size:15px; font-weight: bold; }
        .city { font-size:12px; color:#aaa; margin-bottom:12px; }
        button.play { width:100%; padding:12px; border:none; border-radius:8px; background:#0077ff; color:white; font-weight: bold; cursor: pointer; }
        .share-link { display: block; margin-top: 15px; font-size: 12px; color: #00ccff; cursor: pointer; font-weight: bold; }
        .footer { text-align:center; padding:30px; font-size:12px; color:#aaa; }
    </style>
</head>
<body>

<header>📻 Radios Patagónicas</header>
<div class="now" id="nowPlaying">Seleccioná una radio</div>

<div class="player">
    <audio id="player" controls></audio>
</div>

<div class="filters">
    <button onclick="filtrarProvincia('todas')">Todas</button>
    <button onclick="filtrarProvincia('rionegro')">Río Negro</button>
    <button onclick="filtrarProvincia('neuquen')">Neuquén</button>
</div>

<div class="search">
    <input type="text" id="searchInput" onkeyup="buscarRadio()" placeholder="Buscar radio...">
</div>

<div class="grid" id="radioGrid">
    <div class="card" id="lu5" data-provincia="neuquen" data-name="lu5 am 600">
        <div class="name">LU5 AM 600</div>
        <div class="city">Neuquén Capital</div>
        <button class="play" onclick="playRadio(this, 'https://live.lu5am.com:8443/LU5')">▶ Escuchar</button>
        <div class="share-link" onclick="compartirRadio('lu5', 'LU5 AM 600')">🟢 Compartir por WhatsApp</div>
    </div>
<div class="card" id="pueblo viejo roca" data-provincia="rionegro" data-name="BUSQUEDA">
    <div class="name">Pueblo Viejo 89.9</div>
    <div class="city">General Roca</div>
    <button class="play" onclick="playRadio(this, 'https://s3.netradiofm.com/p/6042/stream)">▶ Escuchar</button>
    <span class="share-link" onclick="compartirRadio('EL-MISMO-ID-UNICO')">🟢 Compartir por WhatsApp</div>
</div>
<div class="card" id="lu18-am640" data-provincia="rionegro" data-name="lu 18 el valle roca">
    <div class="name">LU 18 AM 640</div>
    <div class="city">General Roca</div>
    <button class="play" onclick="playRadio(this, 'https://streamingraddios.online/proxy/valle?mp=/;')">▶ Escuchar</button>
    <span class="share-link" onclick="compartirRadio(lu18-am640')">🟢 Compartir por WhatsApp</div>
</div>
    
</div>

<script>
  const urlCompartir = urlBase + '?radio=' + id;
    const mensaje = encodeURIComponent("📻 Te comparto " + nombre + " en Radios Patagónicas: " + urlCompartir);
    window.open("https://api.whatsapp.com/send?text=" + mensaje, "_blank");
}

window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const radioId = params.get('radio');
    
    if (radioId) {
        const tarjeta = document.getElementById(radioId);
        if (tarjeta) {
            setTimeout(() => {
                tarjeta.scrollIntoView({ behavior: 'smooth' });
                // Resaltamos la recomendada
                tarjeta.style.border = "2px solid #00ffcc";
                now.innerHTML = "👇 Dale Play para escuchar la radio recomendada";
            }, 800);
        }
    }
}

// No olvides mantener tus funciones de buscarRadio() y filtrarProvincia() abajo
</script>
</body>
</html>
