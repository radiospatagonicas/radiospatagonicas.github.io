<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radios Patagónicas</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0d0d0d;
    color:white;
}

header{
    text-align:center;
    padding:15px;
    font-size:20px;
    font-weight:bold;
    background:#111;
}

#buscador{
    width:90%;
    margin:10px auto;
    display:block;
    padding:10px;
    border-radius:8px;
    border:none;
    font-size:16px;
}

.filtros{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
}

.filtros button{
    padding:8px 12px;
    border:none;
    border-radius:20px;
    background:#333;
    color:white;
    cursor:pointer;
    white-space:nowrap;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
    padding:10px;
}

.card{
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.nombre{
    font-size:14px;
    font-weight:bold;
}

.ciudad{
    font-size:12px;
    color:#aaa;
    margin-bottom:5px;
}

.play{
    background:#00aaff;
    border:none;
    padding:8px;
    border-radius:8px;
    color:white;
    cursor:pointer;
    width:100%;
}

audio{
    width:100%;
    margin-top:10px;
}

@media(max-width:600px){
    .grid{
        grid-template-columns:repeat(2, 1fr);
    }
}

</style>
</head>

<body>

<header>📻 Radios Patagónicas</header>

<input type="text" id="buscador" placeholder="Buscar radio o ciudad...">

<div class="filtros">
<button onclick="filtrar('todas')">Todas</button>
<button onclick="filtrar('rionegro')">Río Negro</button>
<button onclick="filtrar('neuquen')">Neuquén</button>
<button onclick="filtrar('chubut')">Chubut</button>
<button onclick="filtrar('santacruz')">Santa Cruz</button>
<button onclick="filtrar('tdf')">Tierra del Fuego</button>  
</div>

<audio id="player" controls></audio>

<div class="grid" id="grid">

<!-- EJEMPLO (copiá este formato) -->

<div class="card" data-provincia="rionegro" data-nombre="radio uno roca">
<div class="nombre">Radio Uno</div>
<div class="ciudad">General Roca</div>
<button class="play" onclick="reproducir('https://cdn.instream.audio/:9140/stream')">
▶ Escuchar</button>
</div>

</div>

<script>

function reproducir(url){
    const player = document.getElementById("player");
    player.src = url;
    player.play();
}

function filtrar(provincia){
    const radios = document.querySelectorAll(".card");

    radios.forEach(radio=>{
        if(provincia === "todas"){
            radio.style.display = "block";
        } else {
            radio.style.display = radio.dataset.provincia === provincia ? "block" : "none";
        }
    });
}

document.getElementById("buscador").addEventListener("input", function(){
    const texto = this.value.toLowerCase();
    const radios = document.querySelectorAll(".card");

    radios.forEach(radio=>{
        const nombre = radio.dataset.nombre;
        radio.style.display = nombre.includes(texto) ? "block" : "none";
    });
});

</script>

</body>
</html>
