<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📻 Radios Patagónicas</title>

<style>
body { margin:0; font-family:'Inter',sans-serif; background:#0a0a0a; color:#eee; display:flex; flex-direction:column; min-height:100vh; }
header { text-align:center; padding:25px; background:#111; border-bottom:1px solid #222; }
.logo-principal { max-width:220px; width:65%; height:auto; border-radius:50%; }

.now { text-align:center; padding:12px; background:#1a1a1a; color:#0077ff; font-size:13px; font-weight:bold; border-bottom:1px solid #222; }

.player-container { position:sticky; top:0; z-index:100; background:#111; padding:10px 0; box-shadow:0 4px 15px rgba(0,0,0,.5); }
.player { width:90%; margin:0 auto; }
audio { width:100%; height:40px; }

.ads-container { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:90%; margin:15px auto; }
.ad-box { background:#161616; padding:15px; border-radius:8px; border:1px dashed #333; color:#555; text-align:center; font-size:11px; }

.filters { display:flex; overflow-x:auto; gap:8px; padding:10px 15px; scrollbar-width:none; }
.filters button { padding:8px 18px; border:none; border-radius:20px; background:#222; color:white; cursor:pointer; font-size:13px; border:1px solid #333; white-space:nowrap; }

.search { width:90%; margin:10px auto; }
.search input { width:100%; padding:15px; border-radius:12px; background:#1a1a1a; color:white; border:1px solid #333; outline:none; box-sizing:border-box; font-size:16px; }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:15px; padding:15px; }
.card { background:#161616; padding:22px; border-radius:18px; text-align:center; border:1px solid #222; transition:.3s; }
.card.active { border-color:#0077ff; background:#1a1a1a; }

.name { font-size:18px; font-weight:bold; margin-bottom:4px; }
.city { font-size:11px; color:#666; margin-bottom:18px; text-transform:uppercase; }

button.play { width:100%; padding:15px; border:none; border-radius:12px; background:#0077ff; color:white; cursor:pointer; font-weight:bold; transition:.3s; }
button.play.on { background:#fff !important; color:#000 !important; }

.share-link { display:inline-block; margin-top:18px; font-size:12px; color:#00ffcc; cursor:pointer; text-decoration:none; border:1px solid #333; padding:5px 10px; border-radius:10px; }

.footer { text-align:center; padding:60px 20px; font-size:13px; color:#666; margin-top:auto; border-top:1px solid #111; background:#0d0d0d; }
.btn-contacto { display:inline-block; margin-top:15px; padding:10px 20px; background:#222; color:#eee; text-decoration:none; border-radius:8px; border:1px solid #333; transition:.3s; }
.btn-contacto:hover { background:#0077ff; border-color:#0077ff; color:#fff; }
</style>
</head>
<body>

<header>
    <img src="tu-logo-amigo.jpg" alt="Radios Patagónicas" class="logo-principal">
</header>

<div class="player-container">
    <div class="now" id="nowPlaying">🎧 Seleccioná una radio para escuchar</div>
    <div class="player">
        <audio id="player" controls autoplay></audio>
    </div>
</div>

<div class="ads-container">
    <div class="ad-box">📢 ESPACIO PUBLICITARIO 1</div>
    <div class="ad-box">📢 ESPACIO PUBLICITARIO 2</div>
</div>

<div class="filters">
    <button onclick="filtrarProvincia('todas')">Todas</button>
    <button onclick="filtrarProvincia('rionegro')">Río Negro</button>
    <button onclick="filtrarProvincia('neuquen')">Neuquén</button>
</div>

<div class="search">
    <input type="text" id="searchInput" onkeyup="buscarRadio()" placeholder="Buscar por nombre, frecuencia o ciudad...">
</div>

<div class="grid" id="radioGrid">

    <div class="card" id="am550" data-provincia="neuquen" data-name="am 550 la primera">
        <div class="name">LRG 206 AM 550</div>
        <div class="city">Neuquén</div>
        <button class="play" onclick="playRadio(this, 'https://sonic.host-live.com:10851/stream')">▶ Escuchar</button>
        <div class="share-link" onclick="compartir('am550','AM 550 La Primera')">🔗 Compartir</div>
    </div>

    <div class="card" id="ejemplohttp" data-provincia="rionegro" data-name="radio ejemplo http">
        <div class="name">Radio HTTP Demo</div>
        <div class="city">General Roca • 🔓 Externa</div>
        <button class="play" onclick="playRadio(this, 'http://radio01.ferozo.com:8976/;stream.mp3')">▶ Escuchar</button>
        <div class="share-link" onclick="compartir('ejemplohttp','Radio HTTP Demo')">🔗 Compartir</div>
    </div>

</div>

<footer class="footer">
    <p>© 2026 Radios Patagónicas - El portal del dial regional.</p>

    <a href="mailto:radiospatagonicas@gmail.com" class="btn-contacto">
        📧 Agregá tu emisora
    </a>

    <br>

    <a href="https://www.facebook.com/radiospatagonicas" target="_blank" class="btn-contacto">
        Facebook
    </a>
</footer>

<script>
const player = document.getElementById("player");
const now = document.getElementById("nowPlaying");
function playRadio(btn, url){
    const nombreRadio = btn.parentElement.querySelector(".name").innerText;

    // RESET VISUAL GENERAL
    document.querySelectorAll(".play").forEach(p=>{
        p.classList.remove("on");
        p.innerText = "▶ Escuchar";
    });

    document.querySelectorAll(".card").forEach(c=>{
        c.classList.remove("active");
    });

    // SI ES STREAM HTTP → POPUP EXTERNO
    if(url.startsWith("http://")){

        // CORTAR PLAYER INTERNO SI ESTABA SONANDO
        player.pause();
        player.removeAttribute("src");
        player.load();

        btn.classList.add("on");
        btn.innerText = "🔓 Externa";
        btn.parentElement.classList.add("active");

        now.innerText = "🔓 Reproduciendo externamente: " + nombreRadio;

        const popup = window.open(
            "",
            "radioPopup",
            "width=420,height=260,resizable=no"
        );

        popup.document.write(`
            <html>
            <head>
                <title>${nombreRadio}</title>
                <style>
                    body{
                        margin:0;
                        background:#111;
                        color:#fff;
                        font-family:Arial,sans-serif;
                        display:flex;
                        justify-content:center;
                        align-items:center;
                        height:100vh;
                        text-align:center;
                    }
                    .box{
                        width:90%;
                    }
                    h2{
                        color:#0077ff;
                        margin-bottom:15px;
                    }
                    button{
                        background:#0077ff;
                        color:#fff;
                        border:none;
                        padding:14px 24px;
                        border-radius:10px;
                        font-size:16px;
                        cursor:pointer;
                        width:100%;
                    }
                    audio{
                        width:100%;
                        margin-top:15px;
                    }
                    p{
                        font-size:12px;
                        color:#888;
                        margin-top:15px;
                    }
                </style>
            </head>
            <body>
                <div class="box">
                    <h2>📻 ${nombreRadio}</h2>
                    <audio id="popupPlayer" controls src="${url}"></audio>
                    <button onclick="document.getElementById('popupPlayer').play()">
                        ▶ Iniciar reproducción
                    </button>
                    <p>Si no inicia automáticamente, presioná Play.</p>
                </div>
            </body>
            </html>
        `);

        popup.document.close();
        return;
    }

    // PLAYER INTERNO HTTPS
    const mismaRadio = player.src.includes(url);

    if(mismaRadio && !player.paused){
        player.pause();
        player.removeAttribute("src");
        player.load();

        now.innerText = "🎧 Seleccioná una radio para escuchar";
        return;
    }

    player.src = url;
    player.play();

    btn.classList.add("on");
    btn.innerText = "⏸ Sonando...";
    btn.parentElement.classList.add("active");

    now.innerText = "🎧 " + nombreRadio;
}
    const mismaRadio = player.src.includes(url);

    if(mismaRadio && !player.paused){
        player.pause();
        player.removeAttribute("src");
        player.load();

        btn.classList.remove("on");
        btn.innerText = "▶ Escuchar";
        btn.parentElement.classList.remove("active");

        now.innerText = "🎧 Seleccioná una radio para escuchar";
        return;
    }

    document.querySelectorAll(".play").forEach(p=>{
        p.classList.remove("on");
        p.innerText = "▶ Escuchar";
    });

    document.querySelectorAll(".card").forEach(c=>{
        c.classList.remove("active");
    });

    player.src = url;
    player.play();

    btn.classList.add("on");
    btn.innerText = "⏸ Sonando...";
    btn.parentElement.classList.add("active");

    now.innerText = "🎧 " + nombreRadio;
}

function buscarRadio(){
    const input = document.getElementById("searchInput").value.toLowerCase();

    document.querySelectorAll(".card").forEach(card=>{
        card.style.display = card.dataset.name.toLowerCase().includes(input)
            ? "block"
            : "none";
    });
}

function filtrarProvincia(prov){
    document.getElementById("searchInput").value = "";

    document.querySelectorAll(".card").forEach(card=>{
        card.style.display =
            (prov === "todas" || card.dataset.provincia === prov)
            ? "block"
            : "none";
    });
}

function compartir(id,nombre){
    const url = window.location.origin + window.location.pathname + "?radio=" + id;

    const texto = encodeURIComponent(
        "📻 Escuchá " + nombre + " en Radios Patagónicas: " + url
    );

    window.open(
        "https://api.whatsapp.com/send?text=" + texto,
        "_blank"
    );
}

player.addEventListener("pause",()=>{
    document.querySelectorAll(".play").forEach(p=>{
        p.classList.remove("on");
        p.innerText = "▶ Escuchar";
    });

    document.querySelectorAll(".card").forEach(c=>{
        c.classList.remove("active");
    });

    now.innerText = "⏸️ Reproducción pausada";
});
</script>

</body>
</html>
