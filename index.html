<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radios Patagónicas</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0a0a0a;
    color:#eee;
}

/* HEADER */
header{
    text-align:center;
    padding:15px;
}

/* BANNER PUBLICIDAD */
.banner-publicidad{
    width:100%;
    max-width:1100px;
    margin:20px auto;
}

@media (max-width:768px){
    .banner-publicidad{
        max-width:100%;
        margin:10px auto;
    }
}
/* GRID RADIOS */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:15px;
    padding:15px;
}

/* TARJETAS */
.card{
    background:#111;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card h3{
    margin:10px 0;
}

/* AUDIO */
audio{
    width:100%;
    margin-top:10px;
}

/* OCULTAR COMPARTIR EN SMART TV */
body.is-smart-tv .share-link{
    display:none !important;
}

/* FOOTER */
footer{
    background:#000;
    padding:20px;
    text-align:center;
    font-size:14px;
    border-top:1px solid #222;
}

.footer-item{
    margin:8px 0;
}

.footer-item a{
    color:#00bfff;
    text-decoration:none;
}

.footer-item a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<header>
    <h1>📻 Radios Patagónicas</h1>
</header>

<!-- BANNER -->
<div class="banner-publicidad">
    <img src="banner-drevanz-2000x240.png" alt="Publicidad Drevanz Producciones">
</div>

<!-- RADIOS -->
<div class="grid">

    <div class="card">
        <h3>Radio Ejemplo 1</h3>
        <audio controls preload="none">
            <source src="URL_STREAM_1" type="audio/mpeg">
        </audio>
        <div class="share-link">
            <a href="#">Compartir</a>
        </div>
    </div>

    <div class="card">
        <h3>Radio Ejemplo 2</h3>
        <audio controls preload="none">
            <source src="URL_STREAM_2" type="audio/mpeg">
        </audio>
        <div class="share-link">
            <a href="#">Compartir</a>
        </div>
    </div>

</div>

<!-- FOOTER -->
<footer>

    <div class="footer-item">
        📧 <a href="mailto:radiospatagonicas@gmail.com">radiospatagonicas@gmail.com</a>
    </div>

    <div class="footer-item">
        📘 <a href="#">Facebook: radiospatagonicas</a>
    </div>

    <div class="footer-item">
        📱 WhatsApp: (espacio para agregar número)
    </div>

</footer>

<!-- SCRIPT DETECTAR SMART TV -->
<script>
function esSmartTV(){
    return /smart-tv|smarttv|googletv|appletv|hbbtv|netcast|viera|tizen|webos/i.test(navigator.userAgent);
}

if(esSmartTV()){
    document.body.classList.add("is-smart-tv");
}
</script>

</body>
</html>
