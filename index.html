<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📻 Radios Patagónicas</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#111;
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:15px;
    background:#1b1b1b;
    font-size:20px;
    font-weight:bold;
}

/* PLAYER */
.player{
    width:95%;
    margin:10px auto;
}

audio{
    width:100%;
}

/* BUSCADOR */
.search{
    width:95%;
    margin:10px auto;
}

.search input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    padding:10px;
}

/* CARD */
.card{
    background:#222;
    padding:12px;
    border-radius:12px;
    text-align:center;
}

/* NOMBRE */
.name{
    font-size:15px;
    margin-bottom:3px;
}

/* CIUDAD */
.city{
    font-size:12px;
    color:#aaa;
    margin-bottom:8px;
}

/* BOTÓN */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#3b6edc;
    color:white;
    font-size:15px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:480px){
    .grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<header>📻 Radios Patagónicas</header>

<div class="player">
<audio id="player" controls></audio>
</div>

<div class="search">
<input type="text" id="searchInput" onkeyup="buscarRadio()" placeholder="Buscar radio o ciudad...">
</div>

<div class="grid" id="radioGrid">

<!-- EJEMPLOS -->

<div class="card" data-name="antena libre roca">
<div class="name">Antena Libre 89.1</div>
<div class="city">General Roca</div>
<button onclick="playRadio('https://cdn.instream.audio/:9140/stream')">▶ Escuchar</button>
</div>

<div class="card" data-name="pueblo viejo roca">
<div class="name">Pueblo Viejo 89.9</div>
<div class="city">General Roca</div>
<button onclick="playRadio('https://s3.netradiofm.com/p/6042/stream')">▶ Escuchar</button>
</div>

<div class="card" data-name="lu19 cipolletti">
<div class="name">LU19 AM 690</div>
<div class="city">Cipolletti</div>
<button onclick="playRadio('https://streaming01.radionline.com.ar/lu19')">▶ Escuchar</button>
</div>

</div>

<script>

let player = document.getElementById("player");
let current = "";

/* PLAY LIMPIO */
function playRadio(url){

    if(current === url){
        player.pause();
        current = "";
        return;
    }

    player.pause();
    player.src = "";
    
    setTimeout(()=>{
        player.src = url;
        player.play();
        current = url;
    }, 200);
}

/* BUSCADOR */
function buscarRadio(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        let name = card.getAttribute("data-name").toLowerCase();
        card.style.display = name.includes(input) ? "block" : "none";
    });
}

</script>

</body>
</html>
