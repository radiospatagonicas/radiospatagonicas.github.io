<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📻 Radios Patagónicas</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#111;
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:15px;
    background:#1b1b1b;
    font-size:20px;
    font-weight:bold;
}

/* PLAYER */
.player{
    width:90%;
    margin:10px auto;
}

audio{
    width:100%;
}

/* BUSCADOR */
.search{
    width:90%;
    margin:10px auto;
}

.search input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    padding:10px;
}

/* CARD */
.card{
    background:#222;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

/* NOMBRE */
.name{
    font-size:14px;
    margin-bottom:3px;
}

/* CIUDAD */
.city{
    font-size:11px;
    color:#aaa;
    margin-bottom:5px;
}

/* BOTONES */
button{
    width:100%;
    padding:6px;
    margin-top:5px;
    border:none;
    border-radius:6px;
    background:#3b6edc;
    color:white;
}

/* CONTADOR */
.badge{
    margin-top:5px;
    font-size:12px;
    color:#aaa;
}

/* RESPONSIVE */
@media(max-width:768px){
    .grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:480px){
    .grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<header>📻 Radios Patagónicas</header>

<div class="player">
<audio id="player" controls></audio>
</div>

<div class="search">
<input type="text" id="searchInput" onkeyup="buscarRadio()" placeholder="Buscar radio o ciudad...">
</div>

<div class="grid" id="radioGrid">

<!-- EJEMPLOS -->

<div class="card" data-name="pueblo viejo roca">
<div class="name">Pueblo Viejo 89.9</div>
<div class="city">General Roca</div>
<button onclick="playRadio(this, 'https://s3.netradiofm.com/p/6042/stream')">▶ Escuchar</button>
<button onclick="toggleFav(this)">⭐</button>
<div class="badge">0</div>
</div>

<div class="card" data-name="antena libre roca">
<div class="name">Antena Libre 89.1</div>
<div class="city">General Roca</div>
<button onclick="playRadio(this, 'https://cdn.instream.audio/:9140/stream')">▶ Escuchar</button>
<button onclick="toggleFav(this)">⭐</button>
<div class="badge">0</div>
</div>

<div class="card" data-name="lu19 cipolletti">
<div class="name">LU19 AM 690</div>
<div class="city">Cipolletti</div>
<button onclick="playRadio(this, 'https://streaming01.radionline.com.ar/lu19')">▶ Escuchar</button>
<button onclick="toggleFav(this)">⭐</button>
<div class="badge">0</div>
</div>

</div>

<script>

let contador = JSON.parse(localStorage.getItem("ranking")) || {};
let favoritos = JSON.parse(localStorage.getItem("favoritos")) || {};

function playRadio(btn, url){
    let player = document.getElementById("player");
    player.src = url;
    player.play();

    let card = btn.parentElement;
    let nombre = card.getAttribute("data-name");

    contador[nombre] = (contador[nombre] || 0) + 1;

    guardar();
    actualizar();
}

function toggleFav(btn){
    let card = btn.parentElement;
    let nombre = card.getAttribute("data-name");

    favoritos[nombre] = !favoritos[nombre];

    guardar();
    actualizar();
}

function guardar(){
    localStorage.setItem("ranking", JSON.stringify(contador));
    localStorage.setItem("favoritos", JSON.stringify(favoritos));
}

function actualizar(){
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        let nombre = card.getAttribute("data-name");

        let count = contador[nombre] || 0;
        card.querySelector(".badge").innerText = count;

        if(favoritos[nombre]){
            card.style.border = "2px solid gold";
        }else{
            card.style.border = "none";
        }
    });

    ordenar();
}

function ordenar(){
    let grid = document.getElementById("radioGrid");
    let cards = Array.from(grid.children);

    cards.sort((a,b)=>{
        let aName = a.getAttribute("data-name");
        let bName = b.getAttribute("data-name");

        let aFav = favoritos[aName] ? 1 : 0;
        let bFav = favoritos[bName] ? 1 : 0;

        if(aFav !== bFav){
            return bFav - aFav;
        }

        return (contador[bName]||0) - (contador[aName]||0);
    });

    cards.forEach(c=>grid.appendChild(c));
}

function buscarRadio(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        let name = card.getAttribute("data-name").toLowerCase();
        card.style.display = name.includes(input) ? "block" : "none";
    });
}

window.onload = actualizar;

</script>

</body>
</html>
