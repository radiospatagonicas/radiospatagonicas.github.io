<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radios Patagónicas</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0d0d0d;
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:15px;
    background:#1a1a1a;
}
.logo{
    max-width:240px;
    width:90%;
}
.slogan{
    font-size:13px;
    color:#aaa;
}

/* AHORA SONANDO */
.now{
    text-align:center;
    padding:10px;
    background:#222;
    color:#00ffcc;
}

/* PLAYER */
.player{
    width:95%;
    margin:10px auto;
}
audio{ width:100%; }

/* PUBLICIDAD */
.ads{
    width:95%;
    margin:10px auto;
    text-align:center;
}
.ads a{
    display:block;
    padding:15px;
    background:#333;
    border-radius:10px;
    color:white;
    text-decoration:none;
}

/* FILTROS */
.filters{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
}
.filters button{
    padding:8px 12px;
    border:none;
    border-radius:20px;
    background:#333;
    color:white;
}

/* BUSCADOR */
.search{
    width:95%;
    margin:10px auto;
}
.search input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    padding:10px;
}
@media(max-width:768px){
    .grid{ grid-template-columns:repeat(2,1fr); }
}
@media(max-width:480px){
    .grid{ grid-template-columns:1fr; }
}

/* CARD */
.card{
    background:#1e1e1e;
    padding:12px;
    border-radius:12px;
    text-align:center;
}

/* ACTIVA */
.card.active{
    box-shadow:0 0 10px #00cc66;
}

/* TEXTO */
.name{ font-size:15px; }
.city{ font-size:12px; color:#aaa; margin-bottom:8px; }

/* BOTONES */
.play{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2a2a2a;
    color:white;
}
.play.active{
    background:#00cc66 !important;
    color:black;
}

.share{
    margin-top:5px;
    width:100%;
    padding:8px;
    border:none;
    border-radius:8px;
    background:#444;
    color:#ccc;
    font-size:12px;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:20px;
    color:#aaa;
}
.footer a{ color:#00ccff; }

</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <div class="slogan">El sonido del sur</div>
</header>

<div class="now" id="nowPlaying">
🎧 No hay radio seleccionada
</div>

<div class="player">
<audio id="player" controls></audio>
</div>

<div class="ads">
<a href="#">📢 Publicite aquí</a>
</div>

<div class="filters">
<button onclick="filtrarProvincia('todas')">Todas</button>
<button onclick="filtrarProvincia('rionegro')">Río Negro</button>
<button onclick="filtrarProvincia('neuquen')">Neuquén</button>
</div>

<div class="search">
<input type="text" id="searchInput" onkeyup="buscarRadio()" placeholder="Buscar radio o ciudad...">
</div>

<div class="grid">

</div>   
<!-- EJEMPLO -->
<div class="card" data-id="test" data-provincia="rionegro" data-name="test">

  <div class="name">Radio Test</div>
  <div class="city">Test</div>

  <button class="play" onclick="playRadio(this, 'https://stream-ssl.alsolnet.com/los40')">
    ▶ Escuchar
  </button>

</div>

</div>

</div>

<div class="footer">
📩 ¿Querés sumar tu radio?
<br><br>
<a href="mailto:radiospatagonicas@gmail.com">Enviar mensaje</a>
</div>

<script>

<script>
let player = document.getElementById("player");
let now = document.getElementById("nowPlaying");
let current = "";

/* PLAY */
function playRadio(btn, url){

    let card = btn.parentElement;
    let name = card.querySelector(".name").innerText;
    let city = card.querySelector(".city").innerText;
    let id = card.getAttribute("data-id");

    // reset botones
    document.querySelectorAll(".play").forEach(b=>{
        b.classList.remove("active");
        b.innerText = "▶ Escuchar";
    });

    // reset cards
    document.querySelectorAll(".card").forEach(c=>{
        c.classList.remove("active");
    });

    // cortar audio SIEMPRE
    player.pause();
    player.src = "";
    player.load();

    // pequeño delay (CLAVE)
    setTimeout(()=>{

        player.src = url;

        function testAudio(){
    let player = document.getElementById("player");
    player.src = "https://stream-ssl.alsolnet.com/los40";
    player.play();
}

            current = url;

            now.innerText = "🎧 Estás escuchando: " + name + " - " + city;

            btn.classList.add("active");
            btn.innerText = "⏸ Pausar";
            card.classList.add("active");

            const newUrl = window.location.pathname + "?radio=" + id;
            window.history.pushState({}, "", newUrl);

        }).catch(error=>{
            now.innerText = "⚠️ No se pudo reproducir";
            console.log(error);
        });

    },300);
}
</script>

</script>

</body>
</html>
