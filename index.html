<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📻 Radios Patagónicas</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#111;
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:15px;
    background:#1b1b1b;
    font-size:20px;
    font-weight:bold;
}

/* AHORA SONANDO */
.now{
    text-align:center;
    padding:10px;
    font-size:14px;
    background:#222;
    color:#0f0;
}

/* PLAYER */
.player{
    width:95%;
    margin:10px auto;
}

audio{
    width:100%;
}

/* FILTRO CIUDADES */
.filters{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
}

.filters button{
    flex:0 0 auto;
    padding:8px 12px;
    border:none;
    border-radius:20px;
    background:#333;
    color:white;
}

/* BUSCADOR */
.search{
    width:95%;
    margin:10px auto;
}

.search input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    padding:10px;
}

/* CARD */
.card{
    background:#222;
    padding:12px;
    border-radius:12px;
    text-align:center;
}

/* TEXTO */
.name{ font-size:15px; }
.city{ font-size:12px; color:#aaa; margin-bottom:8px; }

/* BOTÓN */
button.play{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#3b6edc;
    color:white;
    font-size:15px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .grid{ grid-template-columns:repeat(2,1fr); }
}

@media(max-width:480px){
    .grid{ grid-template-columns:1fr; }
}

</style>
</head>

<body>

<header>📻 Radios Patagónicas</header>

<div class="now" id="nowPlaying">
🎧 No hay radio seleccionada
</div>

<div class="player">
<audio id="player" controls></audio>
</div>

<div class="filters">
<button onclick="filtrarCiudad('todas')">Todas</button>
<button onclick="filtrarCiudad('roca')">Roca</button>
<button onclick="filtrarCiudad('cipolletti')">Cipolletti</button>
</div>

<div class="search">
<input type="text" id="searchInput" onkeyup="buscarRadio()" placeholder="Buscar radio o ciudad...">
</div>

<div class="grid" id="radioGrid">

<div class="card" data-city="roca" data-name="antena libre roca">
<div class="name">Antena Libre 89.1</div>
<div class="city">General Roca</div>
<button class="play" onclick="playRadio(this, 'https://cdn.instream.audio/:9140/stream')">
▶ Escuchar
</button>
</div>

<div class="card" data-city="roca" data-name="pueblo viejo roca">
<div class="name">Pueblo Viejo 89.9</div>
<div class="city">General Roca</div>
<button class="play" onclick="playRadio(this, 'https://s3.netradiofm.com/p/6042/stream')">
▶ Escuchar
</button>
</div>

<div class="card" data-city="cipolletti" data-name="lu19 cipolletti">
<div class="name">LU19 AM 690</div>
<div class="city">Cipolletti</div>
<button class="play" onclick="playRadio(this, 'https://streaming01.radionline.com.ar/lu19')">
▶ Escuchar
</button>
</div>

</div>

<script>

let player = document.getElementById("player");
let now = document.getElementById("nowPlaying");
let current = "";

/* PLAY + MARQUESINA */
function playRadio(btn, url){

    let card = btn.parentElement;
    let name = card.querySelector(".name").innerText;
    let city = card.querySelector(".city").innerText;

    if(current === url){
        player.pause();
        now.innerText = "⏸️ Pausado";
        current = "";
        return;
    }

    player.pause();
    player.src = "";

    setTimeout(()=>{
        player.src = url;
        player.play();
        current = url;

        now.innerText = "🎧 Estás escuchando: " + name + " - " + city;

    },200);
}

/* BUSCADOR */
function buscarRadio(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        let name = card.getAttribute("data-name");
        card.style.display = name.includes(input) ? "block" : "none";
    });
}

/* FILTRO CIUDAD */
function filtrarCiudad(ciudad){
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        if(ciudad === "todas"){
            card.style.display = "block";
        }else{
            card.style.display = card.getAttribute("data-city") === ciudad ? "block" : "none";
        }
    });
}

</script>

</body>
</html>
