<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radios Patagónicas | Directorio Oficial</title>

<style>
:root { --azul:#0077ff; --negro:#0a0a0a; --gris:#161616; --texto-gris:#888; }

body {
    margin:0;
    background:var(--negro);
    color:white;
    font-family:'Segoe UI',sans-serif;
}

/* HEADER */
header {
    text-align:center;
    padding:40px 20px;
    background:#111;
    border-bottom:4px solid var(--azul);
}

.logo-texto {
    font-size:32px;
    font-weight:900;
}

/* ===== BANNER CORRECTO Y ESTABLE ===== */
.banner-top {
    width: 100%;
    max-width: 1100px;
    margin: 20px auto;
}

.banner-top img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 10px;
}


/* CONTROLES */
.controles {
    padding:20px;
    background:#1a1a1a;
    text-align:center;
}

#buscador {
    width:85%;
    max-width:400px;
    padding:12px;
    border-radius:25px;
    border:2px solid var(--azul);
    background:#222;
    color:white;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
    padding:20px;
    max-width:1200px;
    margin:0 auto;
}

.card {
    background:var(--gris);
    padding:20px;
    border-radius:15px;
    text-align:center;
}

button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:var(--azul);
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo-texto">RADIOS PATAGÓNICAS</div>
</header>

<!-- BANNER -->
<div class="banner-top">
<a href="https://wa.me/5493755596267" target="_blank">
<img src="banner1.png" alt="Publicidad">
</a>
</div>

<div class="controles">
<input type="text" placeholder="Buscar radios...">
</div>

<div class="grid">

<div class="card">
<div>LU 18 AM 640</div>
<button>Escuchar</button>
</div>

<div class="card">
<div>AM 550 Neuquén</div>
<button>Escuchar</button>
</div>

</div>

</body>
</html>
