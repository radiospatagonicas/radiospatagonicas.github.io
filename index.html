<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radios Patagónicas</title>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            background-color: #0a0a0a !important; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        header { 
            text-align: center; 
            padding: 60px 20px; 
            background: #111; 
            border-bottom: 4px solid #0077ff; 
        }

        /* ESTE ES TU NUEVO LOGO DE TEXTO */
        .logo-contenedor {
            display: inline-block;
        }

        .logo-texto {
            font-size: 40px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .detalle {
            color: #0077ff; /* El azul que identifica a la radio */
            font-size: 50px;
            line-height: 0;
        }

        .subtitulo {
            color: #888;
            font-size: 14px;
            letter-spacing: 5px;
            margin-top: 10px;
            display: block;
        }

        /* Para que en el celu no se rompa */
        @media (max-width: 600px) {
            .logo-texto { font-size: 24px; }
            .detalle { font-size: 30px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-contenedor">
        <h1 class="logo-texto">
            <span class="detalle">[</span> 
            RADIOS PATAGÓNICAS 
            <span class="detalle">]</span>
        </h1>
        <span class="subtitulo">DIRECTORIO DIGITAL</span>
    </div>
</header>

<div class="grid" id="radioGrid">
    
    <div class="card" data-provincia="rionegro">
        <div class="name">LU 18 AM 640</div>
        <div class="city">General Roca, RN</div>
        <button class="play" onclick="playRadio(this, 'https://streamingraddios.online/proxy/valle?mp=/;')">▶ ESCUCHAR</button>
        <div class="share-link">🔗 COMPARTIR</div>
    </div>

    <div class="card" data-provincia="rionegro">
        <div class="name">LU 19 AM 690</div>
        <div class="city">Cipolletti, RN</div>
        <button class="play" onclick="playRadio(this, 'https://sonic.host-live.com/8064/stream')">▶ ESCUCHAR</button>
        <div class="share-link">🔗 COMPARTIR</div>
    </div>


</div>

</body>
</html>
