<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radios Patagónicas | Directorio</title>
    <style>
        :root { --azul: #0077ff; --negro: #0a0a0a; --gris: #161616; }
        
        body { 
            margin: 0; background: var(--negro); color: white; 
            font-family: 'Segoe UI', sans-serif; 
        }

        /* HEADER & LOGO */
        header { 
            text-align: center; padding: 40px 20px; background: #111; 
            border-bottom: 4px solid var(--azul); 
        }
        .logo-texto {
            font-size: 36px; font-weight: 900; display: flex;
            align-items: center; justify-content: center; gap: 15px;
        }
        .detalle { color: var(--azul); font-size: 45px; }

        /* BUSCADOR Y CONTROLES */
        .controles { 
            padding: 20px; background: #1a1a1a; position: sticky; top: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        #buscador {
            width: 90%; max-width: 500px; padding: 12px; border-radius: 25px;
            border: 2px solid var(--azul); background: #222; color: white; outline: none;
        }

        /* GRILLA */
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto;
        }

        /* TARJETAS */
        .card { 
            background: var(--gris); padding: 25px; border-radius: 20px; 
            text-align: center; border: 1px solid #222; transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--azul); }
        .name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .city { font-size: 12px; color: #888; margin-bottom: 20px; }

        button.play { 
            width: 100%; padding: 12px; border: none; border-radius: 12px; 
            background: var(--azul); color: white; font-weight: bold; cursor: pointer;
        }

        /* BOTÓN COMPARTIR */
        .share-link { 
            margin-top: 15px; font-size: 12px; color: #25d366; /* Color WhatsApp */
            cursor: pointer; display: block; font-weight: bold;
        }

        /* OCULTAR EN SMART TV */
        body.is-smart-tv .share-link {
            display: none !important;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-texto">
        <span class="detalle">[</span> RADIOS PATAGÓNICAS <span class="detalle">]</span>
    </div>
</header>

<div class="controles">
    <input type="text" id="buscador" placeholder="Buscar radio o ciudad...">
</div>

<div class="grid" id="radioGrid">
    
    <div class="card" id="antena-libre" data-provincia="rionegro" data-name="antena libre 89.1 roca">
        <div class="name">Antena Libre 89.1</div>
        <div class="city">General Roca</div>  
        <button class="play" onclick="playRadio(this, 'https://cdn.instream.audio/:9140/stream')">▶ Escuchar</button>
        <div class="share-link" onclick="compartir('antena-libre', 'Antena Libre 89.1')">🔗 Compartir por WhatsApp</div>
    </div>

    </div>

<audio id="audioPlayer"></audio>

<script>
    // 1. DETECCIÓN DE SMART TV (Oculta compartir si detecta TV)
    const ua = navigator.userAgent.toLowerCase();
    const isTV = ua.includes("smart-tv") || ua.includes("smarttv") || ua.includes("googletv") || ua.includes("appletv") || ua.includes("hbbtv");
    
    if (isTV) {
        document.body.classList.add('is-smart-tv');
    }

    // 2. FUNCIÓN COMPARTIR (WhatsApp)
    function compartir(id, nombre) {
        const urlWeb = window.location.href.split('#')[0]; // URL de tu sitio
        const texto = `¡Hola! Te comparto la radio ${nombre}. Escuchala acá en el Directorio de Radios Patagónicas: ${urlWeb}#${id}`;
        const whatsappUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(texto)}`;
        window.open(whatsappUrl, '_blank');
    }

    // 3. REPRODUCTOR
    const player = document.getElementById('audioPlayer');
    function playRadio(btn, url) {
        if (player.src === url && !player.paused) {
            player.pause();
            btn.innerHTML = "▶ Escuchar";
        } else {
            // Detener todos los botones si había alguno sonando
            document.querySelectorAll('.play').forEach(b => b.innerHTML = "▶ Escuchar");
            player.src = url;
            player.play();
            btn.innerHTML = "⏸ Pausar";
        }
    }

    // 4. BUSCADOR
    document.getElementById('buscador').addEventListener('input', function(e) {
        const busqueda = e.target.value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            const texto = card.innerText.toLowerCase();
            card.classList.toggle('hidden', !texto.includes(busqueda));
        });
    });
</script>

</body>
</html>
