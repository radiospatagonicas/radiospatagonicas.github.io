<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radios Patagónicas</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#1e1e1e;
    color:white;
}

/* HEADER */
.header{
    background:#3b6edc;
    padding:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

/* PLAYER */
.player{
    position:sticky;
    top:0;
    background:#111;
    padding:10px;
    z-index:10;
}

audio{
    width:100%;
}

/* BUSCADOR */
.search{
    padding:10px;
}

.search input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:14px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px;
    padding:10px;
}

/* TARJETAS */
.card{
    background:#2b2b2b;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card h3{
    margin:5px 0;
    font-size:14px;
}

.card p{
    margin:0;
    font-size:11px;
    color:#aaa;
}

button{
    width:100%;
    margin-top:8px;
    padding:8px;
    border:none;
    border-radius:6px;
    background:#3b6edc;
    color:white;
    cursor:pointer;
}

/
