<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radios Patagónicas | Directorio Oficial</title>
    <style>
        :root { --azul: #0077ff; --negro: #0a0a0a; --gris: #161616; --texto-gris: #888; }
        
        body { margin: 0; background: var(--negro); color: white; font-family: 'Segoe UI', sans-serif; }

        header { text-align: center; padding: 40px 20px; background: #111; border-bottom: 4px solid var(--azul); }
        .logo-texto { font-size: 32px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .detalle { color: var(--azul); font-size: 40px; }

        /* BUSCADOR Y FILTROS */
        .controles { padding: 20px; background: #1a1a1a; position: sticky; top: 0; z-index: 100; text-align: center; }
        #buscador { width: 85%; max-width: 400px; padding: 12px; border-radius: 25px; border: 2px solid var(--azul); background: #222; color: white; outline: none; margin-bottom: 10px; }
        
        /* GRILLA */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        /* TARJETA MEJORADA */
        .card { background: var(--gris); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: var(--azul); }
        .card.hidden { display: none; }

        .name { font-size: 19px; font-weight: bold; margin-bottom: 8px; display: block; }
        
        /* TAGS CATEGORÍA VISUALES */
        .tag-estilo { 
            display: inline-block;
            background: rgba(0, 119, 255, 0.15); 
            color: var(--azul); 
            font-size: 10px; 
            font-weight: bold; 
            padding: 4px 10px; 
            border-radius: 10px; 
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .city { font-size: 12px; color: var(--texto-gris); margin-bottom: 20px; display: block; }

        /* BOTÓN DE PLAY DINÁMICO */
        button.play { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            background: var(--azul); color: white; font-weight: bold; 
            cursor: pointer; transition: 0.3s; font-size: 13px;
        }

        /* ESTADO ACTIVO: Cuando la radio suena */
        button.play.activo { 
            background: white !important; 
            color: black !important; 
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        .share-link { margin-top: 15px; font-size: 12px; color: #25d366; cursor: pointer; display: block; font-weight: bold; }

        /* SLIDERS PUBLICIDAD */
        .slider-container { width: 90%; max-width: 970px; height: 90px; margin: 20px auto; overflow: hidden; border: 1px dashed #333; border-radius: 10px; }
        .slider-track { display: flex; width: 300%; height: 100%; transition: transform 0.8s ease-in-out; }
        .slide { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #111; color: #444; text-decoration: none; font-weight: bold; flex-shrink: 0; }
    </style>
</head>
<body>

<header>
    <div class="logo-texto"><span class="detalle">[</span> RADIOS PATAGÓNICAS <span class="detalle">]</span></div>
</header>

<div class="slider-container">
    <div class="slider-track" id="sliderTop">
        <a href="#" class="slide">ESPACIO DISPONIBLE</a>
        <a href="#" class="slide">TU PUBLICIDAD AQUÍ</a>
        <a href="#" class="slide">CONTACTANOS</a>
    </div>
</div>

<div class="controles">
    <input type="text" id="buscador" placeholder="Busca radio, ciudad o estilo...">
</div>

<div class="grid" id="radioGrid">
    <div class="card" id="antena-libre" data-provincia="rionegro" data-tags="rock cultura noticias">
        <span class="name">Antena Libre 89.1</span>
        <span class="tag-estilo">Rock & Cultura</span>
        <span class="city">General Roca, RN</span>
        <button class="play" onclick="playRadio(this, 'https://cdn.instream.audio/:9140/stream')">▶ ESCUCHAR</button>
        <div class="share-link" onclick="compartir('antena-libre', 'Antena Libre')">🔗 Compartir WhatsApp</div>
    </div>
</div>

<audio id="audioPlayer"></audio>

<script>
    const player = document.getElementById('audioPlayer');

    function playRadio(btn, url) {
        if (player.src === url && !player.paused) {
            player.pause();
            resetButtons();
        } else {
            resetButtons();
            player.src = url;
            player.play();
            btn.innerText = "⏸ PAUSANDO...";
            btn.classList.add('activo'); // Aquí se vuelve blanco
        }
    }

    function resetButtons() {
        document.querySelectorAll('.play').forEach(b => {
            b.innerText = "▶ ESCUCHAR";
            b.classList.remove('activo');
        });
    }

    // Buscador y Slider (se mantienen igual)
    document.getElementById('buscador').addEventListener('input', function(e) {
        const busqueda = e.target.value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            const info = card.innerText.toLowerCase() + card.getAttribute('data-tags');
            card.classList.toggle('hidden', !info.includes(busqueda));
        });
    });

    setInterval(() => {
        const track = document.getElementById('sliderTop');
        const index = (parseInt(track.dataset.index) || 0) + 1;
        track.dataset.index = index % 3;
        track.style.transform = `translateX(-${(track.dataset.index * 100) / 3}%)`;
    }, 5000);
</script>

</body>
</html>
