<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radios Patagónicas</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0d0d0d;
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:15px;
    background:#1a1a1a;
}
.logo{
    max-width:240px;
    width:90%;
}
.slogan{
    font-size:13px;
    color:#aaa;
}

/* AHORA SONANDO */
.now{
    text-align:center;
    padding:10px;
    background:#222;
    color:#00ffcc;
}

/* PLAYER */
.player{
    width:95%;
    margin:10px auto;
}
audio{ width:100%; }

/* PUBLICIDAD */
.ads{
    width:95%;
    margin:10px auto;
    text-align:center;
}
.ads a{
    display:block;
    padding:15px;
    background:#333;
    border-radius:10px;
    color:white;
    text-decoration:none;
}

/* FILTROS */
.filters{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
}
.filters button{
    padding:8px 12px;
    border:none;
    border-radius:20px;
    background:#333;
    color:white;
}

/* BUSCADOR */
.search{
    width:95%;
    margin:10px auto;
}
.search input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    padding:10px;
}
@media(max-width:768px){
    .grid{ grid-template-columns:repeat(2,1fr); }
}
@media(max-width:480px){
    .grid{ grid-template-columns:1fr; }
}

/* CARD */
.card{
    background:#1e1e1e;
    padding:12px;
    border-radius:12px;
    text-align:center;
}

/* ACTIVA */
.card.active{
    box-shadow:0 0 10px #00cc66;
}

/* TEXTO */
.name{ font-size:15px; }
.city{ font-size:12px; color:#aaa; margin-bottom:8px; }

/* BOTONES */
.play{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2a2a2a;
    color:white;
}
.play.active{
    background:#00cc66 !important;
    color:black;
}

.share{
    margin-top:5px;
    width:100%;
    padding:8px;
    border:none;
    border-radius:8px;
    background:#444;
    color:#ccc;
    font-size:12px;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:20px;
    color:#aaa;
}
.footer a{ color:#00ccff; }

</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <div class="slogan">El sonido del sur</div>
</header>

<div class="now" id="nowPlaying">
🎧 No hay radio seleccionada
</div>

<div class="player">
<audio id="player" controls></audio>
</div>

<div class="ads">
<a href="#">📢 Publicite aquí</a>
</div>

<div class="filters">
<button onclick="filtrarProvincia('todas')">Todas</button>
<button onclick="filtrarProvincia('rionegro')">Río Negro</button>
<button onclick="filtrarProvincia('neuquen')">Neuquén</button>
</div>

<div class="search">
<input type="text" id="searchInput" onkeyup="buscarRadio()" placeholder="Buscar radio o ciudad...">
</div>

<div class="grid">

<!-- EJEMPLO -->
<div class="card" data-id="antena-libre" data-provincia="rionegro" data-name="antena libre roca">

<div class="name">Antena Libre 89.1</div>
<div class="city">General Roca</div>

<button class="play" onclick="playRadio(this, 'https://cdn.instream.audio/:9140/stream')">
▶ Escuchar
</button>

<button class="share" onclick="compartirRadio(this)">
🔗 Compartir
</button>

</div>

</div>

<div class="footer">
📩 ¿Querés sumar tu radio?
<br><br>
<a href="mailto:radiospatagonicas@gmail.com">Enviar mensaje</a>
</div>

<script>

let player = document.getElementById("player");
let now = document.getElementById("nowPlaying");
let current = "";

/* PLAY */
function playRadio(btn, url){

    let card = btn.parentElement;
    let name = card.querySelector(".name").innerText;
    let city = card.querySelector(".city").innerText;
    let id = card.getAttribute("data-id");

    // reset botones
    document.querySelectorAll(".play").forEach(b=>{
        b.classList.remove("active");
        b.innerText = "▶ Escuchar";
    });

    // reset cards
    document.querySelectorAll(".card").forEach(c=>{
        c.classList.remove("active");
    });

    if(current === url){
        player.pause();
        now.innerText = "⏸️ Pausado";
        current = "";
        return;
    }

    player.src = url;
    player.play();
    current = url;

    now.innerText = "🎧 Estás escuchando: " + name + " - " + city;

    btn.classList.add("active");
    btn.innerText = "⏸ Pausar";
    card.classList.add("active");

    const newUrl = window.location.pathname + "?radio=" + id;
    window.history.pushState({}, "", newUrl);
}

/* COMPARTIR */
function compartirRadio(btn){
    let card = btn.parentElement;
    let id = card.getAttribute("data-id");
    let name = card.querySelector(".name").innerText;

    let url = window.location.origin + window.location.pathname + "?radio=" + id;

    if(navigator.share){
        navigator.share({
            title: name,
            text: "Escuchá esta radio:",
            url: url
        });
    } else {
        navigator.clipboard.writeText(url);
        alert("Link copiado 👍");
    }
}

/* BUSCAR */
function buscarRadio(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    document.querySelectorAll(".card").forEach(card=>{
        let name = card.getAttribute("data-name");
        card.style.display = name.includes(input) ? "block" : "none";
    });
}

/* FILTRO */
function filtrarProvincia(prov){
    document.querySelectorAll(".card").forEach(card=>{
        if(prov === "todas"){
            card.style.display = "block";
        }else{
            card.style.display = card.getAttribute("data-provincia") === prov ? "block" : "none";
        }
    });
}

/* AUTO PLAY */
function getRadioFromURL(){
    return new URLSearchParams(window.location.search).get("radio");
}

window.addEventListener("load", ()=>{
    let id = getRadioFromURL();
    if(id){
        let card = document.querySelector([data-id="${id}"]);
        if(card){
            card.querySelector(".play").click();
        }
    }
});

</script>

</body>
</html>
