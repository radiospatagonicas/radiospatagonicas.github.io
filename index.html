<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radios Patagónicas</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#1e1e1e;
    color:white;
}

.header{
    background:#3b6edc;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.player{
    position:sticky;
    top:0;
    background:#111;
    padding:10px;
}

audio{
    width:100%;
}

.grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px;
    padding:10px;
}

.card{
    background:#2b2b2b;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

button{
    width:100%;
    padding:8px;
    border:none;
    border-radius:6px;
    background:#3b6edc;
    color:white;
}

/* celular */
@media(max-width:768px){
    .grid{
        grid-template-columns: repeat(2, 1fr);
    }
}
@media(max-width:480px){
    .grid{
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="header">📻 Radios Patagónicas</div>

<div class="player">
<audio id="player" controls></audio>
</div>

<div class="grid">

<div class="card">
<h3>Pueblo Viejo 89.9</h3>
<p>General Roca</p>
<button onclick="playRadio('https://s3.netradiofm.com/p/6042/stream')">Escuchar</button>
</div>

<div class="card">
<h3>Antena Libre 89.1</h3>
<p>General Roca</p>
<button onclick="playRadio('https://cdn.instream.audio/:9140/stream')">Escuchar</button>
</div>

<div class="card">
<h3>LU19 AM 690</h3>
<p>Cipolletti</p>
<button onclick="playRadio('https://streaming01.radionline.com.ar/lu19')">Escuchar</button>
</div>

</div>

<script>
function playRadio(url){
    var player = document.getElementById("player");
    player.src = url;
    player.load();
    player.play();
}
</script>

</body>
</html>
