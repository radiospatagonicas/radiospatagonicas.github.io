<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📻 Radios Patagónicas</title>
    <style>
       <style>
    body { margin:0; font-family: 'Inter', sans-serif; background:#0a0a0a; color:#e0e0e0; }
    header { text-align:center; padding:25px; background:#111; font-weight: 800; letter-spacing: 2px; color: #0077ff; }
    
    .now { text-align:center; padding:15px; background:#161616; color:#00ffcc; font-size:13px; font-weight: 500; }
    
    .player-container { position: sticky; top: 0; z-index: 100; background: #111; padding: 10px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .player { width:90%; margin:0 auto; }
    audio { width:100%; height: 40px; filter: invert(100%); opacity: 0.8; }

    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; padding:20px; }
    
    /* CARD MODERNA: Sin bordes visibles, solo profundidad */
    .card { 
        background: #1a1a1a; 
        padding: 25px; 
        border-radius: 16px; 
        text-align: center; 
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: none;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    
    /* EFECTO CUANDO SUENA: La tarjeta flota y brilla suavemente */
    .card.active { 
        transform: translateY(-10px); 
        background: #222;
        box-shadow: 0 20px 40px rgba(0, 119, 255, 0.3);
    }

    .name { font-size:18px; font-weight: 700; margin-bottom: 5px; color: #fff; }
    .city { font-size:11px; color:#666; text-transform: uppercase; margin-bottom:20px; }

    button.play { 
        width:100%; padding:15px; border:none; border-radius:12px; 
        background: linear-gradient(135deg, #0077ff, #0055ff); 
        color:white; cursor: pointer; font-weight: 600; transition: 0.3s;
    }
    
    button.play.playing { background: #fff; color: #000; }

    .share-link { display: inline-block; margin-top: 20px; font-size: 11px; color: #444; cursor: pointer; transition: 0.3s; }
    .share-link:hover { color: #25d366; }

    @media(max-width:480px){ .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>

<header>📻 Radios Patagónicas</header>

<div class="player-container">
    <div class="now" id="nowPlaying">🎧 Elegí una radio del dial</div>
    <div class="player">
        <audio id="player" controls autoplay></audio>
    </div>
</div>

<div class="ads">
    <a href="mailto:radiospatagonicas@gmail.com">📢 ESPACIO DISPONIBLE - CONTACTO</a>
</div>

<div class="filters">
    <button onclick="filtrarProvincia('todas')">Todas</button>
    <button onclick="filtrarProvincia('rionegro')">Río Negro</button>
    <button onclick="filtrarProvincia('neuquen')">Neuquén</button>
</div>

<div class="search">
    <input type="text" id="searchInput" onkeyup="buscarRadio()" placeholder="Buscar por nombre, ciudad o frecuencia...">
</div>

<div class="grid" id="radioGrid">
    
    <div class="card" id="pueblo-viejo" data-provincia="rionegro" data-name="pueblo viejo 89.9 roca stefenelli">
        <div class="name">Pueblo Viejo 89.9</div>
        <div class="city">General Roca</div>
        <button class="play" onclick="playRadio(this, 'https://s3.netradiofm.com/p/6042/stream')">▶ Escuchar</button>
        <div class="share-link" onclick="compartir('pueblo-viejo', 'Pueblo Viejo 89.9')">🟢 Compartir por WhatsApp</div>
    </div>

    <div class="card" id="lu18" data-provincia="rionegro" data-name="lu18 am 640 radio el valle roca">
        <div class="name">LU 18 AM 640</div>
        <div class="city">General Roca</div>
        <button class="play" onclick="playRadio(this, 'https://streaming.enlaceip.com.ar:8000/lu18am640')">▶ Escuchar</button>
        <div class="share-link" onclick="compartir('lu18', 'LU 18 AM 640')">🟢 Compartir por WhatsApp</div>
    </div>

</div>

<div class="footer">
    📩 radiospatagonicas@gmail.com<br><br>
    <a href="mailto:radiospatagonicas@gmail.com?subject=Contacto">Sumar mi Radio o Sugerencias</a>
</div>

<script>
    const player = document.getElementById("player");
    const now = document.getElementById("nowPlaying");

    function playRadio(btn, url) {
        // RESET VISUAL INSTANTÁNEO
        document.querySelectorAll(".card").forEach(c => c.style.borderColor = "#2a2a2a");
        document.querySelectorAll(".play").forEach(b => {
            b.style.background = "#0077ff";
            b.innerText = "▶ Escuchar";
        });

        if (player.src === url && !player.paused) {
            player.pause();
            now.innerText = "⏸️ Pausado";
            return;
        }

        // CARGA DIRECTA (MÁXIMA VELOCIDAD)
        player.src = url;
        player.play();

        // ESTILO ACTIVO (AZUL, NO VERDE)
        btn.parentElement.style.borderColor = "#0077ff";
        btn.style.background = "#111"; // Botón se vuelve oscuro al sonar
        btn.innerText = "🔊 Sonando...";
        now.innerText = "🎧 " + btn.parentElement.querySelector(".name").innerText;
    }

    function buscarRadio() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll(".card").forEach(card => {
            card.style.display = card.getAttribute("data-name").includes(input) ? "block" : "none";
        });
    }

    function filtrarProvincia(prov) {
        document.querySelectorAll(".card").forEach(card => {
            card.style.display = (prov === "todas" || card.getAttribute("data-provincia") === prov) ? "block" : "none";
        });
    }

    function compartir(id, nombre) {
        const url = window.location.origin + window.location.pathname + '?radio=' + id;
        const msg = encodeURIComponent("📻 Escuchá " + nombre + " en Radios Patagónicas: " + url);
        window.open("https://api.whatsapp.com/send?text=" + msg, "_blank");
    }

    // GPS PARA EL COMPARTIDO
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const radioId = params.get('radio');
        if (radioId) {
            const card = document.getElementById(radioId);
            if (card) {
                setTimeout(() => {
                    card.scrollIntoView({ behavior: 'smooth' });
                    card.style.borderColor = "#0077ff";
                }, 500);
            }
        }
    }
</script>

</body>
</html>
