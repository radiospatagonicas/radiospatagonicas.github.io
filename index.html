<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radios Patagónicas</title>
    <style>
        body { margin:0; font-family: sans-serif; background:#0a0a0a; color:#eee; }
        header { text-align:center; padding:30px; background:#111; border-bottom: 1px solid #222; }
        .logo-principal { max-width: 250px; height: auto; display: block; margin: 0 auto; }
        .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:15px; padding:20px; }
        .card { background:#161616; padding:20px; border-radius:15px; text-align:center; border: 1px solid #222; }
        .radio-logo-container { width: 80px; height: 80px; margin: 0 auto 10px; border-radius: 50%; background: #222; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .radio-logo { max-width: 100%; object-fit: cover; }
        .name { font-size:18px; font-weight: bold; }
        .city { font-size:12px; color:#666; margin-bottom:15px; }
        button.play { width:100%; padding:12px; border:none; border-radius:10px; background:#0077ff; color:white; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<header>
    <img src="logoprin.png" alt="Radios Patagónicas" class="logo-principal">
</header>

<div class="grid">
    <div class="card">
        <div class="radio-logo-container">
            <img src="https://radioarg.net/storage/radios/7752/9874/conversions/lu18-radio-el-valle-am-640-lg.webp" class="radio-logo">
        </div>
        <div class="name">LU 18 AM 640</div>
        <div class="city">General Roca</div>
        <button class="play">▶ Escuchar</button>
    </div>
</div>

</body>
</html>
