<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radios Patagónicas</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#1e1e1e;
    color:white;
}

/* HEADER */
.header{
    background:#3b6edc;
    padding:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

/* PLAYER */
.player{
    position:sticky;
    top:0;
    background:#111;
    padding:10px;
    z-index:10;
}

audio{
    width:100%;
}

/* BUSCADOR */
.search{
    padding:10px;
}

.search input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:14px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px;
    padding:10px;
}

/* CARD */
.card{
    background:#2b2b2b;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card h3{
    margin:5px 0;
    font-size:14px;
}

.card p{
    margin:0;
    font-size:11px;
    color:#aaa;
}

button{
    width:100%;
    margin-top:8px;
    padding:8px;
    border:none;
    border-radius:6px;
    background:#3b6edc;
    color:white;
    cursor:pointer;
}

/* RANKING */
.badge{
    margin-top:5px;
    font-size:11px;
    background:#ff9800;
    padding:3px 6px;
    border-radius:6px;
    display:inline-block;
}

/* RESPONSIVE */
@media(max-width:768px){
    .grid{
        grid-template-columns: repeat(2, 1fr);
    }
}

@media(max-width:480px){
    .grid{
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="header">📻 Radios Patagónicas</div>

<div class="player">
<audio id="player" controls></audio>
</div>

<div class="search">
<input type="text" id="searchInput" placeholder="Buscar radio..." onkeyup="buscarRadio()">
</div>

<div class="grid" id="radioGrid">

<div class="card" data-name="pueblo viejo">
<h3>Pueblo Viejo 89.9</h3>
<p>General Roca</p>
<button onclick="playRadio(this, 'https://s3.netradiofm.com/p/6042/stream')">Escuchar</button>
<div class="badge">0</div>
</div>

<div class="card" data-name="antena libre">
<h3>Antena Libre 89.1</h3>
<p>General Roca</p>
<button onclick="playRadio(this, 'https://cdn.instream.audio/:9140/stream')">Escuchar</button>
<div class="badge">0</div>
</div>

<div class="card" data-name="lu19">
<h3>LU19 AM 690</h3>
<p>Cipolletti</p>
<button onclick="playRadio(this, 'https://streaming01.radionline.com.ar/lu19')">Escuchar</button>
<div class="badge">0</div>
</div>

</div>

<script>

let contador = {};

function playRadio(btn, url){
    var player = document.getElementById("player");
    player.src = url;
    player.load();
    player.play().catch(()=>{});

    let card = btn.parentElement;
    let nombre = card.getAttribute("data-name");

    if(!contador[nombre]){
        contador[nombre] = 0;
    }

    contador[nombre]++;

    card.querySelector(".badge").innerText = contador[nombre];

    ordenarRanking();
}

function buscarRadio(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let name = card.getAttribute("data-name");
        if(name.includes(input)){
            card.style.display = "block";
        }else{
            card.style.display = "none";
        }
    });
}

function ordenarRanking(){
    let grid = document.getElementById("radioGrid");
    let cards = Array.from(grid.children);

    cards.sort((a,b)=>{
        let aCount = parseInt(a.querySelector(".badge").innerText);
        let bCount = parseInt(b.querySelector(".badge").innerText);
        return bCount - aCount;
    });

    cards.forEach(card => grid.appendChild(card));
}

</script>

</body>
</html>
