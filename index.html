<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radios Patagónicas</title>

<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
}

h1 {
  margin: 20px 0 5px;
}

.slogan {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
  padding: 10px;
}

.radio {
  background: #222;
  padding: 10px;
  border-radius: 10px;
}

.radio.active {
  background: #007BFF;
}

.name {
  font-weight: bold;
  margin-bottom: 8px;
}

button {
  padding: 5px 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>RADIOS PATAGÓNICAS</h1>
<div class="slogan">El sonido del sur</div>

<div class="grid">

  <!-- RADIO 1 -->
  <div class="radio" data-id="sonix">
    <div class="name">FM Sonix</div>
    <audio src="URL_STREAM_SONIX"></audio>
    <button onclick="playRadio(this)">▶</button>
  </div>

  <!-- RADIO 2 -->
  <div class="radio" data-id="antena-libre">
    <div class="name">Antena Libre</div>
    <audio src="URL_STREAM_ANTENA"></audio>
    <button onclick="playRadio(this)">▶</button>
  </div>

</div>

<script>
function playRadio(button) {
  const radio = button.closest(".radio");
  const audio = radio.querySelector("audio");
  const id = radio.getAttribute("data-id");

  // detener todas
  document.querySelectorAll("audio").forEach(a => {
    a.pause();
    a.currentTime = 0;
  });

  // reproducir
  audio.play();

  // marcar activa
  document.querySelectorAll(".radio").forEach(r => r.classList.remove("active"));
  radio.classList.add("active");

  // actualizar URL
  const newUrl = window.location.pathname + "?radio=" + id;
  window.history.pushState({}, "", newUrl);
}

// detectar radio en URL
function getRadioFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("radio");
}

// reproducir desde link
function playRadioById(id) {
  const radio = document.querySelector(.radio[data-id="${id}"]);
  if (radio) {
    const audio = radio.querySelector("audio");

    document.querySelectorAll("audio").forEach(a => {
      a.pause();
      a.currentTime = 0;
    });

    audio.play();

    document.querySelectorAll(".radio").forEach(r => r.classList.remove("active"));
    radio.classList.add("active");

    radio.scrollIntoView({ behavior: "smooth", block: "center" });
  }
}

// al cargar la página
window.addEventListener("load", () => {
  const id = getRadioFromURL();
  if (id) {
    playRadioById(id);
  }
});
</script>

</body>
</html>
