<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radios Patagónicas - El Portal del Dial</title>
    <style>
        :root {
            --primario: #2c3e50;
            --secundario: #ffd700; /* Dorado para lo local */
            --fondo: #f4f4f4;
            --texto: #333;
            --mp: #009ee3; /* Azul Mercado Pago */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px;
            background: var(--primario);
            color: white;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* --- FILTROS --- */
        .seccion-filtros {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-filtro {
            padding: 10px 18px;
            border: none;
            border-radius: 20px;
            background: var(--primario);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-filtro.especial {
            background: var(--secundario);
            color: #000;
        }

        .btn-filtro:hover { opacity: 0.8; transform: translateY(-2px); }

        /* --- GRILLA DE RADIOS --- */
        .contenedor-radios {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .radio-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Clase para destacar las locales */
        .card-local {
            border: 2px solid var(--secundario);
            background: #fffdf0;
        }

        .sello-local {
            display: inline-block;
            background: var(--secundario);
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
            width: fit-content;
        }

        .radio-card h3 { margin: 0 0 5px 0; color: var(--primario); }
        .radio-card p { margin: 0 0 15px 0; color: #666; font-size: 14px; }

        .btn-escuchar {
            background: var(--primario);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .btn-aporte {
            display: block;
            margin-top: 10px;
            background: var(--mp);
            color: white !important;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            font-size: 14px;
            color: #888;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .contenedor-radios { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>📻 Radios Patagónicas</h1>
    <p>El mapa real del dial regional</p>
</header>

<div class="seccion-filtros">
    <button class="btn-filtro" onclick="filtrar('todas')">Todas</button>
    <button class="btn-filtro especial" onclick="filtrar('local')">⭐ Producción Local</button>
    <button class="btn-filtro" onclick="filtrar('am')">Solo AM</button>
    <button class="btn-filtro" onclick="filtrar('nacional')">Nacionales / Cadenas</button>
</div>

<div class="contenedor-radios" id="grilla">

    <div class="radio-card local am card-local">
        <span class="sello-local">Patrimonio del Valle</span>
        <h3>LU 18 AM 640</h3>
        <p>General Roca, Río Negro</p>
        <button class="btn-escuchar" onclick="reproducir('TU_URL_STREAM')">▶ Escuchar en Vivo</button>
        <a href="LINK_MP_OPCIONAL" target="_blank" class="btn-aporte">❤️ Apoyar Emisora</a>
    </div>

    <div class="radio-card nacional am">
        <h3>LRA 43 Nacional AM 970</h3>
        <p>Neuquén Capital</p>
        <button class="btn-escuchar" onclick="reproducir('TU_URL_STREAM')">▶ Escuchar en Vivo</button>
    </div>

    <div class="radio-card local card-local">
        <span class="sello-local">100% Producción Roca</span>
        <h3>Antena Libre 89.1</h3>
        <p>General Roca, Río Negro</p>
        <button class="btn-escuchar" onclick="reproducir('TU_URL_STREAM')">▶ Escuchar en Vivo</button>
    </div>

    </div>

<footer>
    <p>© 2026 Radios Patagónicas - Pasión por el aire regional.</p>
</footer>

<script>
    function reproducir(url) {
        console.log("Reproduciendo: " + url);
        // Aquí va tu lógica actual de reproducción de audio
        // Si usás una función externa o un reproductor HTML5, integralo aquí.
    }

    function filtrar(categoria) {
        const tarjetas = document.querySelectorAll('.radio-card');
        
        tarjetas.forEach(tarjeta => {
            if (categoria === 'todas') {
                tarjeta.style.display = 'flex';
            } else {
                if (tarjeta.classList.contains(categoria)) {
                    tarjeta.style.display = 'flex';
                } else {
                    tarjeta.style.display = 'none';
                }
            }
        });
    }
</script>

</body>
</html>
