<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radios Patagónicas | Directorio Profesional</title>
    <style>
        :root { --azul: #0077ff; --negro: #0a0a0a; --gris: #161616; }
        
        body { 
            margin: 0; background: var(--negro); color: white; 
            font-family: 'Segoe UI', sans-serif; 
        }

        /* HEADER & LOGO */
        header { 
            text-align: center; padding: 40px 20px; background: #111; 
            border-bottom: 4px solid var(--azul); 
        }
        .logo-texto {
            font-size: 36px; font-weight: 900; display: flex;
            align-items: center; justify-content: center; gap: 15px;
        }
        .detalle { color: var(--azul); font-size: 45px; }

        /* BUSCADOR Y FILTROS */
        .controles { 
            padding: 20px; background: #1a1a1a; position: sticky; top: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        #buscador {
            width: 90%; max-width: 500px; padding: 12px; border-radius: 25px;
            border: 2px solid var(--azul); background: #222; color: white; outline: none;
        }
        .filtros { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn-filtro {
            padding: 8px 15px; border-radius: 15px; border: 1px solid #444;
            background: #222; color: #ccc; cursor: pointer; font-size: 13px;
        }
        .btn-filtro.active { background: var(--azul); color: white; border-color: var(--azul); }

        /* GRILLA Y TARJETAS */
        .main-container { display: flex; flex-direction: column; align-items: center; }
        .publicidad { 
            width: 90%; max-width: 970px; height: 90px; background: #222; 
            margin: 20px 0; display: flex; align-items: center; justify-content: center;
            color: #444; border: 1px dashed #444;
        }
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; padding: 20px; width: 100%; max-width: 1200px;
        }
        .card { 
            background: var(--gris); padding: 25px; border-radius: 20px; 
            text-align: center; border: 1px solid #222; transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--azul); }
        .card.hidden { display: none; }
        
        .name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .format { font-size: 11px; color: var(--azul); font-weight: bold; margin-bottom: 10px; }
        .city { font-size: 12px; color: #888; margin-bottom: 15px; }

        button.play { 
            width: 100%; padding: 12px; border: none; border-radius: 12px; 
            background: var(--azul); color: white; font-weight: bold; cursor: pointer;
        }

        /* FOOTER REDES */
        footer { padding: 40px; text-align: center; background: #111; margin-top: 40px; }
        .redes { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .redes a { color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <div class="logo-texto">
        <span class="detalle">[</span> RADIOS PATAGÓNICAS <span class="detalle">]</span>
    </div>
</header>

<div class="controles">
    <input type="text" id="buscador" placeholder="Buscar por radio, ciudad o estilo (ej: Rock)...">
    <div class="filtros">
        <button class="btn-filtro active" onclick="filtrarProvincia('todas', this)">Todas</button>
        <button class="btn-filtro" onclick="filtrarProvincia('rionegro', this)">Río Negro</button>
        <button class="btn-filtro" onclick="filtrarProvincia('neuquen', this)">Neuquén</button>
        <button class="btn-filtro" onclick="filtrarProvincia('chubut', this)">Chubut</button>
    </div>
</div>

<div class="main-container">
    <div class="publicidad">ESPACIO PUBLICITARIO</div>

    <div class="grid" id="radioGrid">
        <div class="card" data-provincia="rionegro" data-tags="rock 90 latino">
            <div class="name">LU 18 AM 640</div>
            <div class="format">ROCK 90S | NOTICIAS</div>
            <div class="city">General Roca, RN</div>
            <button class="play" onclick="playRadio('URL_STREAMING')">▶ ESCUCHAR</button>
        </div>
        
        </div>

    <div class="publicidad">ESPACIO PUBLICITARIO</div>
</div>

<footer>
    <div class="redes">
        <a href="#">FACEBOOK</a>
        <a href="mailto:info@tusitio.com">CORREO</a>
        <a href="#">WHATSAPP</a>
    </div>
    <p style="font-size: 10px; color: #444;">© 2026 Directorio de Radios Patagónicas</p>
</footer>

<audio id="audioPlayer"></audio>

<script>
    const player = document.getElementById('audioPlayer');
    const cards = document.getElementsByClassName('card');

    // BUSCADOR EN TIEMPO REAL
    document.getElementById('buscador').addEventListener('input', function(e) {
        const busqueda = e.target.value.toLowerCase();
        Array.from(cards).forEach(card => {
            const contenido = card.textContent.toLowerCase() + card.getAttribute('data-tags');
            if(contenido.includes(busqueda)) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });
    });

    // FILTRO POR PROVINCIA
    function filtrarProvincia(prov, btn) {
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        Array.from(cards).forEach(card => {
            if(prov === 'todas' || card.getAttribute('data-provincia') === prov) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });
    }

    function playRadio(url) {
        if (player.src === url && !player.paused) {
            player.pause();
        } else {
            player.src = url;
            player.play();
        }
    }
</script>

</body>
</html>
