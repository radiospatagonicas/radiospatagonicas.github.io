<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📻 Radios Patagónicas</title>
    <style>
       .logo-principal {
            width: 80%;
            max-width: 300px;
            height: auto !important;
            display: block;
            margin: 0 auto;
            /* Solo un resplandor sutil */
            filter: drop-shadow(0px 0px 5px rgba(255, 255, 255, 0.2)); 
        }

            /* --- TRUCO MÁGICO --- */
            /* 1. Invertimos los colores (Negro -> Blanco) */
            filter: invert(1) brightness(2); 
            
            /* 2. Le agregamos un contorno/resplandor blanco suave */
            filter: drop-shadow(0px 0px 10px rgba(255, 255, 255, 0.6));
        }
    </style>
</head>
<body>

<header>
    <img src="logoblanco.png" alt="Radios Patagónicas" class="logo-principal">
</header>

<div class="grid" id="radioGrid">
    <div class="card" data-provincia="rionegro">
        <div class="name">LU 18 AM 640</div>
        <div class="city">General Roca</div>
        <button class="play">▶ Escuchar</button>
        <div class="share-link">🔗 Compartir</div>
    </div>
</div>

</body>
</html>
