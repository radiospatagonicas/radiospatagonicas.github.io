<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radios Patagónicas</title>
    <style>
       .logo-principal {
            /* Forzamos un ancho mínimo y máximo para que se luzca */
            width: 70%; /* Se adapta al ancho de la pantalla del celular */
            max-width: 280px; /* Pero no se hace gigante en una PC */
            
            /* Aseguramos que la altura sea automática para no deformar */
            height: auto !important; 
            
            /* Centrado perfecto */
            display: block;
            margin: 0 auto;
            
            /* Un poco de sombra para darle profundidad sobre el fondo negro */
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.7));
            
            /* Evitamos cualquier borde o padding extra que la achique */
            padding: 0;
            border: none;
        }
    </style>
</head>
<body>

<header>
    <img src="https://raw.githubusercontent.com/patagonico888/radiospatagonicas/main/logoprin.png" alt="Radios Patagónicas" class="logo-principal">
</header>

<div class="grid">
    <div class="card">
        <div class="radio-logo-container">
            <img src="https://radioarg.net/storage/radios/7752/9874/conversions/lu18-radio-el-valle-am-640-lg.webp" class="radio-logo">
        </div>
        <div class="name">LU 18 AM 640</div>
        <div class="city">General Roca</div>
        <button class="play">▶ Escuchar</button>
    </div>
</div>

</body>
</html>
