<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📻 Radios Patagónicas</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#0d0d0d;
    color:white;
}

header{
    text-align:center;
    padding:15px;
    background:#1a1a1a;
}

.logo{
    max-width:260px;
    width:90%;
}

.slogan{
    font-size:13px;
    color:#aaa;
}

/* AHORA SONANDO */
.now{
    text-align:center;
    padding:10px;
    background:#222;
    color:#00ffcc;
    font-size:14px;
}

/* PLAYER */
.player{
    width:95%;
    margin:10px auto;
}
audio{ width:100%; }

/* PUBLICIDAD */
.ads{
    width:95%;
    margin:10px auto;
    text-align:center;
}
.ads a{
    display:block;
    padding:15px;
    background:#333;
    border-radius:10px;
    color:#fff;
    text-decoration:none;
}

/* FILTROS */
.filters{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
}
.filters button{
    padding:8px 12px;
    border:none;
    border-radius:20px;
    background:#333;
    color:white;
}

/* BUSCADOR */
.search{
    width:95%;
    margin:10px auto;
}
.search input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    padding:10px;
}

.card{
    background:#1e1e1e;
    padding:12px;
    border-radius:12px;
    text-align:center;
}

.name{ font-size:15px; }
.city{ font-size:12px; color:#aaa; margin-bottom:8px; }

/* BOTONES */
button.play{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0077ff;
    color:white;
}

button.share{
    margin-top:5px;
    width:100%;
    padding:8px;
    border:none;
    border-radius:8px;
    background:#444;
    color:#ccc;
    font-size:12px;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:20px;
    font-size:13px;
    color:#aaa;
}
.footer a{
    color:#00ccff;
}

/* RESPONSIVE */
@media(max-width:768px){
    .grid{ grid-template-columns:repeat(2,1fr); }
}
@media(max-width:480px){
    .grid{ grid-template-columns:1fr; }
}

</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <div class="slogan">El sonido del sur</div>
</header>

<div class="now" id="nowPlaying">
🎧 No hay radio seleccionada
</div>

<div class="player">
<audio id="player" controls></audio>
</div>

<div class="ads">
<a href="#">📢 Publicite aquí</a>
</div>

<div class="filters">
<button onclick="filtrarProvincia('todas')">Todas</button>
<button onclick="filtrarProvincia('rionegro')">Río Negro</button>
<button onclick="filtrarProvincia('neuquen')">Neuquén</button>
<button onclick="filtrarProvincia('chubut')">Chubut</button>
<button onclick="filtrarProvincia('santacruz')">Santa Cruz</button>
<button onclick="filtrarProvincia('tdf')">Tierra del Fuego</button>
</div>

<div class="search">
<input type="text" id="searchInput" onkeyup="buscarRadio()" placeholder="Buscar radio o ciudad...">
</div>

<div class="grid">

<!-- EJEMPLO -->
<div class="card" data-id="antena-libre" data-provincia="rionegro" data-name="antena libre roca">
<div class="name">Antena Libre 89.1</div>
<div class="city">General Roca</div>

<button class="play" onclick="playRadio(this, 'https://cdn.instream.audio/:9140/stream')">
▶ Escuchar
</button>

<button class="share" onclick="compartirRadio(this)">
🔗 Compartir
</button>

</div>

<div class="card" data-id="pueblo-viejo" data-provincia="rionegro" data-name="pueblo viejo roca">
<div class="name">Pueblo Viejo 89.9</div>
<div class="city">General Roca</div>

<button class="play" onclick="playRadio(this, 'https://s3.netradiofm.com/p/6042/stream')">
▶ Escuchar
</button>

<button class="share" onclick="compartirRadio(this)">
🔗 Compartir
</button>

<div class="card" data-id="lu18-am640" data-provincia="rionegro" data-name="lu18 el valle roca">
<div class="name">LU18 AM 640</div>
<div class="city">General Roca</div>

<button class="play" onclick="playRadio(this, 'https://streamingraddios.online/proxy/valle?mp=/;')">
▶ Escuchar
</button>

<button class="share" onclick="compartirRadio(this)">
🔗 Compartir
</button>

<div class="card" data-id="lu19-am690" data-provincia="rionegro" data-name="la voz del comahue cipo">
<div class="name">LU19 AM 690</div>
<div class="city">Cipolletti</div>

<button class="play" onclick="playRadio(this, 'https://cdn.instream.audio/:9140/stream')">
▶ Escuchar
</button>

<button class="share" onclick="compartirRadio(this)">
🔗 Compartir
</button>





    
</div>

<div class="footer">
📩 ¿Querés sumar tu radio o corregir datos?
<br><br>
<a href="mailto:radiospatagonicas@gmail.com">
Enviar mensaje
</a>
</div>

<script>

let player = document.getElementById("player");
let now = document.getElementById("nowPlaying");
let current = "";

/* PLAY */
function playRadio(btn, url){

    let card = btn.parentElement;
    let name = card.querySelector(".name").innerText;
    let city = card.querySelector(".city").innerText;
    let id = card.getAttribute("data-id");

    if(current === url){
        player.pause();
        now.innerText = "⏸️ Pausado";
        current = "";
        return;
    }

    player.pause();
    player.src = "";

    setTimeout(()=>{
        player.src = url;
        player.play();
        current = url;

        now.innerText = "🎧 Estás escuchando: " + name + " - " + city;

        const newUrl = window.location.pathname + "?radio=" + id;
        window.history.pushState({}, "", newUrl);

    },200);
}

/* COMPARTIR */
function compartirRadio(btn){

    let card = btn.parentElement;
    let id = card.getAttribute("data-id");
    let name = card.querySelector(".name").innerText;

    let url = window.location.origin + window.location.pathname + "?radio=" + id;

    if(navigator.share){
        navigator.share({
            title: name,
            text: "Escuchá esta radio:",
            url: url
        });
    } else {
        navigator.clipboard.writeText(url);
        alert("Link copiado 👍");
    }
}

/* BUSCADOR */
function buscarRadio(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        let name = card.getAttribute("data-name");
        card.style.display = name.includes(input) ? "block" : "none";
    });
}

/* FILTRO */
function filtrarProvincia(prov){
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        if(prov === "todas"){
            card.style.display = "block";
        }else{
            card.style.display = card.getAttribute("data-provincia") === prov ? "block" : "none";
        }
    });
}

/* AUTO PLAY DESDE LINK */
function getRadioFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get("radio");
}

function playRadioById(id){
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        if(card.getAttribute("data-id") === id){
            let btn = card.querySelector(".play");
            btn.click();
        }
    });
}

window.addEventListener("load", ()=>{
    let id = getRadioFromURL();
    if(id){
        setTimeout(()=>{
            playRadioById(id);
        },500);
    }
});

</script>

</body>
</html>
