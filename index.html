<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📻 Radios Patagónicas</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#0d0d0d;
    color:white;
}

header{
    text-align:center;
    padding:15px;
    font-size:22px;
    background:#1a1a1a;
}

/* AHORA SONANDO */
.now{
    text-align:center;
    padding:10px;
    background:#222;
    color:#00ffcc;
    font-size:14px;
}

/* PLAYER */
.player{
    width:95%;
    margin:10px auto;
}
audio{ width:100%; }

/* PUBLICIDAD */
.ads{
    width:95%;
    margin:10px auto;
    text-align:center;
}
.ads a{
    display:block;
    padding:15px;
    background:#333;
    border-radius:10px;
    color:#fff;
    text-decoration:none;
}

/* FILTROS */
.filters{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
}
.filters button{
    padding:8px 12px;
    border:none;
    border-radius:20px;
    background:#333;
    color:white;
}

/* BUSCADOR */
.search{
    width:95%;
    margin:10px auto;
}
.search input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    padding:10px;
}

.card{
    background:#1e1e1e;
    padding:12px;
    border-radius:12px;
    text-align:center;
}

.name{ font-size:15px; }
.city{ font-size:12px; color:#aaa; margin-bottom:8px; }

button.play{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0077ff;
    color:white;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:20px;
    font-size:13px;
    color:#aaa;
}
.footer a{
    color:#00ccff;
}

/* RESPONSIVE */
@media(max-width:768px){
    .grid{ grid-template-columns:repeat(2,1fr); }
}
@media(max-width:480px){
    .grid{ grid-template-columns:1fr; }
}

</style>
</head>

<body>

<header>📻 Radios Patagónicas</header>

<div class="now" id="nowPlaying">
🎧 No hay radio seleccionada
</div>

<div class="player">
<audio id="player" controls></audio>
</div>

<!-- PUBLICIDAD -->
<div class="ads">
<a href="#" target="_blank">📢 Publicite aquí</a>
</div>

<!-- FILTRO -->
<div class="filters">
<button onclick="filtrarProvincia('todas')">Todas</button>
<button onclick="filtrarProvincia('rionegro')">Río Negro</button>
<button onclick="filtrarProvincia('neuquen')">Neuquén</button>
<button onclick="filtrarProvincia('chubut')">Chubut</button>
<button onclick="filtrarProvincia('santacruz')">Santa Cruz</button>
<button onclick="filtrarProvincia('tdf')">Tierra del Fuego</button>
</div>

<!-- BUSCADOR -->
<div class="search">
<input type="text" id="searchInput" onkeyup="buscarRadio()" placeholder="Buscar radio o ciudad...">
</div>

<!-- RADIOS -->
<div class="grid">

<!-- EJEMPLO -->
<div class="card" data-provincia="rionegro" data-name="antena libre roca">
<div class="name">Antena Libre 89.1</div>
<div class="city">General Roca</div>
<button class="play" onclick="playRadio(this, 'https://cdn.instream.audio/:9140/stream')">
▶ Escuchar
</button>
</div>

</div>

<!-- CONTACTO -->
<div class="footer">
📩 ¿Querés sumar tu radio o corregir datos?
<br><br>
<a href="mailto:radiospatagonicas@gmail.com?subject=Contacto Radios Patagónicas">
Enviar mensaje
</a>
</div>

<script>

/* PLAYER */
let player = document.getElementById("player");
let now = document.getElementById("nowPlaying");
let current = "";

/* PLAY */
function playRadio(btn, url){

    let card = btn.parentElement;
    let name = card.querySelector(".name").innerText;
    let city = card.querySelector(".city").innerText;

    if(current === url){
        player.pause();
        now.innerText = "⏸️ Pausado";
        current = "";
        return;
    }

    player.pause();
    player.src = "";

    setTimeout(()=>{
        player.src = url;
        player.play();
        current = url;

        now.innerText = "🎧 Estás escuchando: " + name + " - " + city;

    },200);
}

/* BUSCADOR */
function buscarRadio(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        let name = card.getAttribute("data-name");
        card.style.display = name.includes(input) ? "block" : "none";
    });
}

/* FILTRO */
function filtrarProvincia(prov){
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        if(prov === "todas"){
            card.style.display = "block";
        }else{
            card.style.display = card.getAttribute("data-provincia") === prov ? "block" : "none";
        }
    });
}

</script>

</body>
</html>
