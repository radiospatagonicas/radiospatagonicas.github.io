<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📻 Radios Patagónicas</title>
    <style>
        body { margin:0; font-family: 'Inter', sans-serif; background:#0a0a0a; color:#eee; display: flex; flex-direction: column; min-height: 100vh; }
        header { text-align:center; padding:25px; background:#111; border-bottom: 1px solid #222; }
        .logo-principal { max-width: 220px; width: 65%; height: auto; border-radius: 50%; }
        
        /* BARRA DE ESTADO CELESTE */
        .now { text-align:center; padding:12px; background:#1a1a1a; color:#0077ff; font-size:13px; font-weight: bold; border-bottom: 1px solid #222; }
        
        .player-container { position: sticky; top: 0; z-index: 100; background: #111; padding: 10px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .player { width:90%; margin:0 auto; }
        audio { width:100%; height: 40px; }

        .ads-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin: 15px auto; }
        .ad-box { background: #161616; padding: 15px; border-radius: 8px; border: 1px dashed #333; color: #555; text-decoration: none; text-align: center; font-size: 11px; }

        .filters { display:flex; overflow-x:auto; gap:8px; padding:10px 15px; scrollbar-width: none; }
        .filters button { padding:8px 18px; border:none; border-radius:20px; background:#222; color:white; cursor: pointer; font-size: 13px; border: 1px solid #333; }

        .search { width:90%; margin:10px auto; }
        .search input { width:100%; padding:15px; border-radius:12px; background: #1a1a1a; color: white; border: 1px solid #333; outline: none; }

        .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:15px; padding:15px; }
        
        /* CARD Y BOTONES */
        .card { background:#161616; padding:22px; border-radius:18px; text-align:center; border: 1px solid #222; transition: 0.3s; }
        .card.active { border-color: #0077ff; } /* Borde celeste cuando está activa */
        
        .name { font-size:18px; font-weight: bold; margin-bottom: 4px; }
        .city { font-size:11px; color:#666; margin-bottom:18px; text-transform: uppercase; }

        /* EL BOTÓN "BANDERA": Celeste por defecto, Blanco cuando suena */
        button.play { width:100%; padding:15px; border:none; border-radius:12px; background:#0077ff; color:white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button.play.on { background: #ffffff !important; color: #000000 !important; } 

        .share-link { display: inline-block; margin-top: 18px; font-size: 11px; color: #444; cursor: pointer; }
        .tv-mode .share-link { display: none !important; }

        .footer { text-align:center; padding:50px 20px; font-size:12px; color:#444; margin-top: auto; }
    </style>
</head>
<body>

<header>
    <img src="tu-logo-amigo.jpg" alt="Radios Patagónicas" class="logo-principal">
</header>

<div class="player-container">
    <div class="now" id="nowPlaying">🎧 Seleccioná una emisora</div>
    <div class="player">
        <audio id="player" controls autoplay></audio>
    </div>
</div>

<div class="ads-container">
    <a href="mailto:radiospatagonicas@gmail.com" class="ad-box">📢 ESPACIO DISPONIBLE</a>
    <a href="mailto:radiospatagonicas@gmail.com" class="ad-box">📢 CONTACTO</a>
</div>

<div class="filters">
    <button onclick="filtrarProvincia('todas')">Todas</button>
    <button onclick="filtrarProvincia('rionegro')">Río Negro</button>
    <button onclick="filtrarProvincia('neuquen')">Neuquén</button>
</div>

<div class="search">
    <input type="text" id="searchInput" onkeyup="buscarRadio()" placeholder="Buscar radio o ciudad...">
</div>

<div class="grid" id="radioGrid">
    <div class="card" data-provincia="rionegro" data-name="lu 18 radio el valle roca">
        <div class="name">LU 18 AM 640</div>
        <div class="city">General Roca</div>
        <button class="play" onclick="playRadio(this, 'https://streamingraddios.online/proxy/valle?mp=/;')">▶ Escuchar</button>
    </div>
    </div>

<div class="footer">
    radiospatagonicas@gmail.com | <small>© 2026 Radios Patagónicas</small>
</div>

<script>
    const player = document.getElementById("player");
    const now = document.getElementById("nowPlaying");

    if (navigator.userAgent.match(/Android TV|SmartTV|GoogleTV/i)) {
        document.body.classList.add("tv-mode");
    }

    function playRadio(btn, url) {
        // 1. Limpiar todos los botones antes de activar el nuevo
        document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".play").forEach(p => {
            p.classList.remove("on");
            p.innerText = "▶ Escuchar";
        });

        // 2. Ejecutar el streaming
        player.src = url;
        player.play();

        // 3. Activar el estilo "Blanco" en el botón actual
        btn.parentElement.classList.add("active");
        btn.classList.add("on");
        btn.innerText = "⏸️ Sonando...";
        
        // 4. Actualizar barra de estado
        now.innerText = "🎧 " + btn.parentElement.querySelector(".name").innerText;
    }

    function buscarRadio() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll(".card").forEach(card => {
            card.style.display = card.getAttribute("data-name").includes(input) ? "block" : "none";
        });
    }

    function filtrarProvincia(p) {
        document.querySelectorAll(".card").forEach(c => {
            c.style.display = (p === 'todas' || c.getAttribute('data-provincia') === p) ? 'block' : 'none';
        });
    }
</script>
</body>
</html>
