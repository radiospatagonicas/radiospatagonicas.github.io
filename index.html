<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📻 Radios Patagónicas</title>
    <style>
        /* DISEÑO MODERNO Y LIMPIO */
        body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background:#0a0a0a; color:#eee; }
        header { text-align:center; padding:20px; background:#111; font-weight: bold; font-size: 1.2em; border-bottom: 1px solid #222; }
        
        .now { text-align:center; padding:12px; background:#1a1a1a; color:#00ffcc; font-size:13px; min-height: 20px; border-bottom: 1px solid #222; }
        
        .player-container { position: sticky; top: 0; z-index: 100; background: #111; padding: 10px 0; }
        .player { width:90%; margin:0 auto; }
        audio { width:100%; height: 40px; border-radius: 8px; }

        .ads { width:90%; margin:15px auto; text-align:center; }
        .ads a { display:block; padding:10px; background:#1a1a1a; border-radius:6px; color:#555; text-decoration:none; font-size: 12px; border: 1px solid #222; }

        .filters { display:flex; overflow-x:auto; gap:8px; padding:10px; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .filters button { padding:8px 16px; border:none; border-radius:20px; background:#222; color:white; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .filters button:active { background: #0077ff; }

        .search { width:95%; margin:10px auto; }
        .search input { width:100%; padding:14px; border:none; border-radius:10px; box-sizing: border-box; background: #1a1a1a; color: white; font-size: 16px; border: 1px solid #333; }

        .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:15px; padding:15px; }
        
        /* CARD: Sin bordes de colores, efecto de profundidad suave */
        .card { background:#161616; padding:20px; border-radius:15px; text-align:center; border: 1px solid #222; transition: 0.3s; }
        .card.active { border-color: #0077ff; background: #1c1c1c; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .name { font-size:17px; font-weight: bold; margin-bottom: 4px; }
        .city { font-size:11px; color:#666; margin-bottom:15px; text-transform: uppercase; }

        button.play { width:100%; padding:14px; border:none; border-radius:10px; background:#0077ff; color:white; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        button.play.on { background: #fff; color: #000; }
        
        .share-link { display: inline-block; margin-top: 15px; font-size: 11px; color: #444; cursor: pointer; }

        .footer { text-align:center; padding:40px; font-size:13px; color:#444; }
        .footer a { color:#0077ff; text-decoration: none; }

        @media(max-width:480px){ .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>

<header>📻 Radios Patagónicas</header>

<div class="player-container">
    <div class="now" id="nowPlaying">🎧 Seleccioná una radio</div>
    <div class="player">
        <audio id="player" controls></audio>
    </div>
</div>

<div class="ads">
    <a href="mailto:radiospatagonicas@gmail.com">📢 ESPACIO DISPONIBLE - CONTACTO</a>
</div>

<div class="filters">
    <button onclick="filtrarProvincia('todas')">Todas</button>
    <button onclick="filtrarProvincia('rionegro')">Río Negro</button>
    <button onclick="filtrarProvincia('neuquen')">Neuquén</button>
</div>

<div class="search">
    <input type="text" id="searchInput" onkeyup="buscarRadio()" placeholder="Buscar radio o ciudad...">
</div>

<div class="grid" id="radioGrid">
    
    <div class="card" id="pueblo-viejo" data-provincia="rionegro" data-name="pueblo viejo 89.9 roca stefenelli">
        <div class="name">Pueblo Viejo 89.9</div>
        <div class="city">General Roca</div>
        <button class="play" onclick="playRadio(this, 'https://s3.netradiofm.com/p/6042/stream')">▶ Escuchar</button>
        <div class="share-link" onclick="compartir('pueblo-viejo', 'Pueblo Viejo 89.9')">🟢 Compartir por WhatsApp</div>
    </div>

    <div class="card" id="lu18" data-provincia="rionegro" data-name="lu18 am 640 radio el valle roca">
        <div class="name">LU 18 AM 640</div>
        <div class="city">General Roca</div>
        <button class="play" onclick="playRadio(this, 'https://streaming.enlaceip.com.ar:8000/lu18am640')">▶ Escuchar</button>
        <div class="share-link" onclick="compartir('lu18', 'LU 18 AM 640')">🟢 Compartir por WhatsApp</div>
    </div>

</div>

<div class="footer">
    📩 radiospatagonicas@gmail.com<br><br>
    <a href="mailto:radiospatagonicas@gmail.com?subject=Sugerencia">Sumar mi Radio o Sugerencias</a>
</div>

<script>
    const player = document.getElementById("player");
    const now = document.getElementById("nowPlaying");

    function playRadio(btn, url) {
        // Limpieza visual inmediata
        document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".play").forEach(b => {
            b.classList.remove("on");
            b.innerText = "▶ Escuchar";
        });

        // Si ya está sonando esta misma, pausamos
        if (player.src === url && !player.paused) {
            player.pause();
            now.innerText = "⏸️ Pausado";
            return;
        }

        // Reproducción rápida
        player.src = url;
        player.play();

        // Estilo activo
        btn.parentElement.classList.add("active");
        btn.classList.add("on");
        btn.innerText = "⏸️ Sonando";
        now.innerText = "🎧 " + btn.parentElement.querySelector(".name").innerText;
    }

    function buscarRadio() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll(".card").forEach(card => {
            card.style.display = card.getAttribute("data-name").includes(input) ? "block" : "none";
        });
    }

    function filtrarProvincia(prov) {
        document.querySelectorAll(".card").forEach(card => {
            card.style.display = (prov === "todas" || card.getAttribute("data-provincia") === prov) ? "block" : "none";
        });
    }

    function compartir(id, nombre) {
        const url = window.location.origin + window.location.pathname + '?radio=' + id;
        const msg = encodeURIComponent("📻 Escuchá " + nombre + " en Radios Patagónicas: " + url);
        window.open("https://api.whatsapp.com/send?text=" + msg, "_blank");
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const radioId = params.get('radio');
        if (radioId) {
            const card = document.getElementById(radioId);
            if (card) {
                setTimeout(() => {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    card.classList.add("active");
                }, 500);
            }
        }
    }
</script>

</body>
</html>
